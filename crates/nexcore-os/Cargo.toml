
[package]
name = "nexcore-os"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "NexCore OS — Operating system core runtime with STOS-based boot sequence"
authors = ["Matthew Campion, PharmD <matthew@nexvigilant.com>"]
license = "LicenseRef-NexVigilant-Proprietary"
repository = "https://github.com/nexvigilant/nexcore"
keywords = ["os", "runtime", "boot", "state-machine", "operating-system"]
categories = ["os", "embedded"]

[dependencies]
nexcore-error = { workspace = true }
nexcore-pal = { version = "0.1.0", path = "../nexcore-pal", registry = "nexcore" }
nexcore-network = { version = "0.1.0", path = "../nexcore-network", registry = "nexcore" }
nexcore-audio = { version = "0.1.0", path = "../nexcore-audio", registry = "nexcore" }
nexcore-state-os = { version = "0.1.0", path = "../nexcore-state-os", registry = "nexcore" }
nexcore-cytokine = { version = "1.0.0", path = "../nexcore-cytokine", registry = "nexcore" }
nexcore-energy = { version = "0.1.0", path = "../nexcore-energy", registry = "nexcore" }
nexcore-clearance = { version = "1.0.0", path = "../nexcore-clearance", registry = "nexcore" }
nexcore-vault = { version = "1.0.0", path = "../nexcore-vault", registry = "nexcore" }
nexcore-brain = { version = "1.0.0", path = "../nexcore-brain", registry = "nexcore" }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore" }
nexcore-trust = { version = "0.1.0", path = "../nexcore-trust", registry = "nexcore" }
nexcore-pal-linux = { version = "0.1.0", path = "../nexcore-pal-linux", registry = "nexcore" }
sha2 = { version = "0.10.8" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
tracing = { version = "0.1.40" }
chrono = { version = "0.4.38", features = ["serde"] }
nexcore-fs = { workspace = true }
nexcore-tov = { version = "1.0.0", path = "../nexcore-tov", registry = "nexcore" }
nexcore-primitives = { version = "1.0.0", path = "../nexcore-primitives", registry = "nexcore" }
nexcore-dtree = { version = "1.0.0", path = "../nexcore-dtree", registry = "nexcore" }
nexcore-ribosome = { version = "1.0.0", path = "../nexcore-ribosome", registry = "nexcore" }
nexcore-pv-core = { version = "1.0.0", path = "../nexcore-pv-core", registry = "nexcore" }
nexcore-id = { version = "0.1.0", path = "../nexcore-id", features = ["serde"], registry = "nexcore" }
antitransformer = { version = "1.0.0", path = "../antitransformer", registry = "nexcore" }
stem-math = { version = "0.1.0", path = "../stem-math", registry = "nexcore" }
nexcore-integumentary = { version = "1.0.0", path = "../nexcore-integumentary", registry = "nexcore" }
nexcore-skeletal = { version = "1.0.0", path = "../nexcore-skeletal", registry = "nexcore" }
nexcore-muscular = { version = "1.0.0", path = "../nexcore-muscular", registry = "nexcore" }
nexcore-circulatory = { version = "1.0.0", path = "../nexcore-circulatory", registry = "nexcore" }
nexcore-respiratory = { version = "1.0.0", path = "../nexcore-respiratory", registry = "nexcore" }
nexcore-digestive = { version = "1.0.0", path = "../nexcore-digestive", registry = "nexcore" }
nexcore-lymphatic = { version = "1.0.0", path = "../nexcore-lymphatic", registry = "nexcore" }
nexcore-nervous = { version = "1.0.0", path = "../nexcore-nervous", registry = "nexcore" }
nexcore-hormones = { version = "1.0.0", path = "../nexcore-hormones", registry = "nexcore" }
nexcore-urinary = { version = "1.0.0", path = "../nexcore-urinary", registry = "nexcore" }
nexcore-reproductive = { version = "1.0.0", path = "../nexcore-reproductive", registry = "nexcore" }
nexcore-browser = { version = "0.1.0", path = "../nexcore-browser", optional = true, registry = "nexcore" }
nexcore-insight = { version = "0.1.0", path = "../nexcore-insight", optional = true, registry = "nexcore" }
reqwest = { version = "0.12.5", features = ["json"] }
dashmap = "6.0.1"
async-trait = "0.1.81"
toml = "0.8.15"
tokio = { version = "1.38.0", features = ["rt-multi-thread", "macros", "sync"] }

[features]
default = ["insight"]
insight = ["dep:nexcore-insight"]
browser = ["dep:nexcore-browser"]

[dev-dependencies]
nexcore-pal-linux = { version = "0.1.0", path = "../nexcore-pal-linux", registry = "nexcore" }
tempfile = { version = "3.10.1" }

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = "warn"
pedantic = "warn"
nursery = "warn"
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
module_name_repetitions = "allow"
doc_markdown = "allow"
missing_const_for_fn = "allow"
cast_possible_truncation = "allow"
option_if_let_else = "allow"
significant_drop_tightening = "allow"
