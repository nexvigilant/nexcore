
[package]
name = "nexcore-pal-linux"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Linux platform implementation for NexCore PAL — sysfs, evdev, DRM backends"
authors = ["Matthew Campion, PharmD <matthew@nexvigilant.com>"]
license = "LicenseRef-NexVigilant-Proprietary"
repository = "https://github.com/nexvigilant/nexcore"
keywords = ["linux", "platform", "hal", "drm", "evdev"]
categories = ["os::linux-apis", "hardware-support"]

[dependencies]
nexcore-pal = { version = "0.1.0", path = "../nexcore-pal", registry = "nexcore" }
nix = { version = "0.29", features = ["signal", "process", "fs", "mount", "reboot", "hostname"] }
tracing = { version = "0.1.40" }

[dev-dependencies]
tempfile = { version = "3.10.1" }

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = "warn"
pedantic = "warn"
nursery = "warn"
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
module_name_repetitions = "allow"
doc_markdown = "allow"
missing_const_for_fn = "allow"
cast_possible_truncation = "allow"
cast_sign_loss = "allow"
ptr_arg = "allow"
option_if_let_else = "allow"
significant_drop_tightening = "allow"
