
[package]
name = "nexcore-vigilance"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
repository = "https://github.com/nexvigilant/nexcore"
rust-version = "1.85"
description = "NexVigilant Core: The Vigilance Kernel - Theory of Vigilance, Guardian-AV, and consolidated domain modules"

[dependencies]
nexcore-constants = { version = "1.0.0", path = "../nexcore-constants", registry = "nexcore" }
nexcore-edit-distance = { version = "1.0.0", path = "../nexcore-edit-distance", registry = "nexcore" }
nexcore-tov = { version = "1.0.0", path = "../nexcore-tov", registry = "nexcore" }
nexcore-harm-taxonomy = { version = "1.0.0", path = "../nexcore-harm-taxonomy", registry = "nexcore" }
nexcore-pv-core = { version = "1.0.0", path = "../nexcore-pv-core", registry = "nexcore" }
nexcore-pvdsl = { version = "1.0.0", path = "../nexcore-pvdsl", registry = "nexcore" }
nexcore-pvos = { version = "1.0.0", path = "../nexcore-pvos", registry = "nexcore" }
nexcore-skills-engine = { version = "1.0.0", path = "../nexcore-skills-engine", registry = "nexcore" }
nexcore-guardian-engine = { version = "1.0.0", path = "../nexcore-guardian-engine", registry = "nexcore" }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = "1.0.120"
nexcore-chrono = { workspace = true }
nexcore-id = { version = "0.1.0", path = "../nexcore-id", features = ["serde"], registry = "nexcore" }
nexcore-error = { workspace = true }

# AI clients (consolidated from nexcore-ai)
async-trait = "0.1.81"
reqwest = { version = "0.12.5", features = ["json"] }

# Cloud integrations (consolidated from nexcore-cloud)
tokio = { version = "1.38.0", features = ["full"] }

# Orchestrator (consolidated from nexcore-orchestrator)
futures = "0.3.30"

# Quiz platform (consolidated from nexcore-quiz)
dashmap = "6.0.1"
rand = "0.9.0"

# Guardian compliance (consolidated from nexcore-guardian)
regex = "1.10.5"
sha2 = "0.10.8"
nexcore-codec = { version = "0.1.0", path = "../nexcore-codec", registry = "nexcore" }

# Command Center (consolidated from nexcore-command-center)
rust_decimal = { version = "1.37", features = ["serde", "serde-with-str"] }

# Vocabulary intelligence (consolidated from nexcore-vocab)
phf = { version = "0.11.2", features = ["macros"] }

# CTVP framework (consolidated from nexcore-ctvp)
toml = "0.8.15"
nexcore-fs = { workspace = true }

# Validation engine (consolidated from nexcore-validation)
serde_yml = "0.0.12"
colored = "3.0.0"

# UI Mapper (consolidated from nexcore-ui-mapper)
clap = { version = "4.5.11", features = ["derive", "cargo", "env"] }
indexmap = { version = "2.2", features = ["serde"] }

# Crypto (consolidated from nexcore-crypto)
tracing = "0.1.40"

# Medical coding (consolidated from nexcore-coding)
rayon = "1.10.0"

# Decision tree engine (CART)
nexcore-dtree = { version = "1.0.0", path = "../nexcore-dtree", registry = "nexcore" }

# nexcore-foundation = { workspace = true }  # CONSOLIDATED into vigilance::foundation

# Foundation dependencies (consolidated from nexcore-foundation)
flate2 = "1.0.30"

# Test taxonomy (Rust AST parsing)
syn = { version = "2.0.71", features = ["full"] }
# base64 — REPLACED by nexcore-codec (already in deps from hex migration)

# Browser sensing (for BrowserSensor)
nexcore-browser = { version = "0.1.0", path = "../nexcore-browser", registry = "nexcore" }

# Cytokine signaling (for CytokineSensor/Actuator)
nexcore-cytokine = { version = "1.0.0", path = "../nexcore-cytokine", registry = "nexcore" }

# Ribosome (schema contract registry, for RibosomeDampSensor)
nexcore-ribosome = { version = "1.0.0", path = "../nexcore-ribosome", registry = "nexcore" }
# Biological pipeline crates (for GroundsTo impls)
nexcore-transcriptase = { version = "1.0.0", path = "../nexcore-transcriptase", registry = "nexcore" }
nexcore-phenotype = { version = "1.0.0", path = "../nexcore-phenotype", registry = "nexcore" }
nexcore-hormones = { version = "1.0.0", path = "../nexcore-hormones", registry = "nexcore" }
signal = { version = "1.0.0", path = "../signal", registry = "nexcore" }
nexcore-signal-types = { version = "1.0.0", path = "../nexcore-signal-types", registry = "nexcore" }
nexcore-primitives = { workspace = true }
nexcore-measure = { version = "1.0.0", path = "../nexcore-measure", registry = "nexcore" }
stem-math = { version = "0.1.0", path = "../stem-math", registry = "nexcore" }
nexcore-labs = { version = "1.0.0", path = "../nexcore-labs", registry = "nexcore" }
nexcore-proof-of-meaning = { workspace = true }

[dev-dependencies]
tempfile = "3.10.1"
tokio = { version = "1.38.0", features = ["rt-multi-thread", "macros"] }
criterion = { version = "0.5", features = ["html_reports"] }
pprof = { version = "0.14", features = ["flamegraph", "criterion"] }
proptest = "1.6.0"

[dependencies.plotters]
version = "0.3"
default-features = false
features = ["svg_backend", "line_series", "area_series"]
optional = true

[features]
default = []
# CTVP Phase 1: Chaos engineering tests for fault injection
# Run with: cargo test --features chaos-tests -p nexcore-vigilance
chaos-tests = []
# Signal visualization: cargo build -p nexcore-vigilance --features viz
viz = ["plotters"]

[[bench]]
name = "signal_benchmarks"
harness = false

[[bench]]
name = "foundation_benchmarks"
harness = false

[[bin]]
name = "audit-confidence"
path = "src/bin/audit_confidence.rs"

# TODO: sentinel-scan requires nexcore_faers_etl (cyclic dependency)
# [[bin]]
# name = "sentinel-scan"
# path = "src/bin/sentinel_scan.rs"


[lints]
workspace = true
