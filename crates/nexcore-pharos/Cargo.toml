[package]
name = "nexcore-pharos"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
rust-version = "1.85"
description = "PHAROS — Pharmacovigilance Autonomous Reconnaissance and Observation System. Continuous signal surveillance pipeline."

[[bin]]
name = "pharos"
path = "src/main.rs"

[lib]
name = "nexcore_pharos"
path = "src/lib.rs"

[dependencies]
# Workspace crates
nexcore-faers-etl = { workspace = true }
nexcore-vigilance = { workspace = true }
nexcore-cytokine = { workspace = true }
nexcore-guardian-engine = { workspace = true }
nexcore-primitives = { workspace = true }

# Workspace dependencies
tokio = { workspace = true, features = ["full"] }
nexcore-error = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
clap = { workspace = true, features = ["derive", "cargo", "env"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
nexcore-id = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
toml = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[lints]
workspace = true
