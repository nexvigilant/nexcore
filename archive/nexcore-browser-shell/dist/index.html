<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexVigilant Browser</title>
    <link data-trunk rel="rust" data-wasm-opt="z"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        .browser-shell {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .browser-chrome {
            background: #16213e;
            border-bottom: 1px solid #0f3460;
        }
        .tab-bar {
            display: flex;
            align-items: center;
            padding: 8px;
            gap: 4px;
        }
        .tab {
            background: #0f3460;
            padding: 8px 16px;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
        }
        .tab:hover {
            background: #1a4a7a;
        }
        .new-tab-btn {
            background: transparent;
            border: none;
            color: #eee;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 12px;
        }
        .nav-bar {
            display: flex;
            align-items: center;
            padding: 8px;
            gap: 8px;
        }
        .nav-btn {
            background: #0f3460;
            border: none;
            color: #eee;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .nav-btn:hover {
            background: #1a4a7a;
        }
        .address-bar {
            flex: 1;
            background: #0f3460;
            border: 1px solid #1a4a7a;
            color: #eee;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        .address-bar:focus {
            outline: none;
            border-color: #e94560;
        }
        .browser-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .webview-placeholder {
            text-align: center;
        }
        .webview-placeholder p {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .webview-placeholder .subtitle {
            font-size: 14px;
            color: #888;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 4px 12px;
            background: #16213e;
            font-size: 12px;
            color: #888;
        }
        .guardian-indicator {
            cursor: help;
        }
    </style>
</head>
<body>
    <div id="app"></div>

        const { invoke } = window.__TAURI__.core;

        // Initialize app
        console.log('NexVigilant Browser Shell loaded');
    </script>
</body>
</html>
