
[package]
name = "nexcore-urinary"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "MIT OR Apache-2.0"
repository.workspace = true
homepage.workspace = true
description = "Urinary system for filtration — Nephron(log filtering) + Reabsorption(metric reclaim) + Excretion(waste disposal) + Retention policies(tubular reabsorption)"

keywords = ["nexcore", "mathematics", "science"]
categories = ["science", "algorithms"]
[dependencies]
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }

[lints]
workspace = true

[dev-dependencies]
nexcore-cardiovascular = { path = "../nexcore-cardiovascular" }
nexcore-circulatory = { path = "../nexcore-circulatory" }
nexcore-energy = { path = "../nexcore-energy" }
nexcore-lymphatic = { path = "../nexcore-lymphatic" }
