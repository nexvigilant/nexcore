
[package]
name = "nexcore-skill-verify"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Skill verification infrastructure for Claude Code skills"
license = "MIT OR Apache-2.0"
repository.workspace = true
homepage.workspace = true
readme = "README.md"

keywords = ["nexcore", "knowledge-management", "automation"]
categories = ["development-tools"]
[dependencies]
nexcore-error = { workspace = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yml = "0.0.12"
clap = { version = "4.0", features = ["derive"] }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }

[dev-dependencies]
tempfile = "3.15"

[[bin]]
name = "skill-verify"
path = "bin/skill-verify.rs"


[lints]
workspace = true
