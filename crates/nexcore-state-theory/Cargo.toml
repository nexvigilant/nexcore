
[package]
name = "nexcore-state-theory"
version = "0.1.0"
edition = "2024"
license = "LicenseRef-NexVigilant-Proprietary-1.0"
rust-version = "1.85"
description = "Universal Theory of State — domain-agnostic state machine foundations"
authors = ["Matthew Campion, PharmD <matthew@camp-corp.com>"]
repository = "https://github.com/nexvigilant/nexcore"
homepage.workspace = true
keywords = ["state-machine", "typestate", "formal-verification", "theory"]
categories = ["data-structures", "no-std"]

[dependencies]
serde = { version = "1.0.204", features = ["derive"] }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }

[dev-dependencies]
proptest = "1.4"

[features]
default = ["std"]
std = []
kani = []

[lints]
workspace = true
