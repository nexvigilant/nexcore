
[package]
name = "nexcore-ghost"
description = "Ghost Mode — privacy-by-design pseudonymization, redaction audit, and PII leak detection for NexVigilant"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "MIT OR Apache-2.0"
repository.workspace = true
homepage.workspace = true
rust-version = "1.85"

keywords = ["nexcore", "pharmacovigilance", "drug-safety"]
categories = ["science"]
[dependencies]
ring = "0.17"
nexcore-codec = { version = "0.1.0", path = "../nexcore-codec" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
nexcore-chrono = { workspace = true }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }

[dev-dependencies]


[lints]
workspace = true
