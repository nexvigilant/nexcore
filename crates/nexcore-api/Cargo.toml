
[package]
name = "nexcore-api"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
repository = "https://github.com/nexvigilant/nexcore"
rust-version = "1.85"
description = "NexVigilant Core REST API - HTTP interface for pharmacovigilance and skill operations"

[[bin]]
name = "nexcore-api"
path = "src/main.rs"

[dependencies]
# Internal crates
nexcore-vigilance = { workspace = true }
nexcore-vigil = { workspace = true }
nexcore-pv-core = { workspace = true }
nexcore-primitives = { workspace = true }
nexcore-skill-exec = { workspace = true }
nexcore-state-os = { workspace = true }
nexcore-mesh = { workspace = true }
signal = { workspace = true }
vr-tenant = { workspace = true }
vr-core = { workspace = true }
base64 = { workspace = true }

# HTTP server
axum = { workspace = true }
tower-http = { workspace = true }
tokio = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Error handling
anyhow = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# OpenAPI
utoipa = { workspace = true }
utoipa-scalar = { version = "0.3", features = ["axum"] }

# HTTP client (for FRIDAY/Qdrant health checks)
reqwest = { workspace = true }

# Async
futures = { workspace = true }

# Utilities
chrono = { workspace = true }
dirs = { workspace = true }
nexcore-id = { workspace = true }
shellexpand = "3.1"
uuid = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
tower = { workspace = true }

[lints]
workspace = true
