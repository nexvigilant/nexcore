
[package]
name = "nexcore-pv-core"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
repository = "https://github.com/nexvigilant/nexcore"
rust-version = "1.85"
description = "Pharmacovigilance signal detection core: PRR, ROR, IC, EBGM, Chi², causality, FAERS, risk analytics"
keywords = ["pharmacovigilance", "signal-detection", "drug-safety", "faers"]
categories = ["science", "algorithms"]

[dependencies]
nexcore-error = { workspace = true }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
chrono = { version = "0.4.38", features = ["serde"] }
rand = "0.9"
rayon = { version = "1.10.0" }
nexcore-tov = { version = "1.0.0", path = "../nexcore-tov", registry = "nexcore" }
nexcore-constants = { version = "1.0.0", path = "../nexcore-constants", registry = "nexcore" }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore" }
nexcore-signal-types = { version = "1.0.0", path = "../nexcore-signal-types", registry = "nexcore" }
nexcore-preemptive-pv = { version = "1.0.0", path = "../nexcore-preemptive-pv", registry = "nexcore" }
signal = { version = "1.0.0", path = "../signal", registry = "nexcore" }
phf = { version = "0.11.2", features = ["macros"] }

[dev-dependencies]
tempfile = { version = "3.10.1" }

[lints.rust]
async_fn_in_trait = "allow"
dead_code = "allow"
unused_imports = "allow"
unused_variables = "allow"
unused_mut = "allow"
unused_assignments = "allow"
unused_must_use = "allow"

[lints.clippy]
all = "allow"
pedantic = "allow"
nursery = "allow"
cargo = "allow"
map_unwrap_or = "allow"
manual_map = "allow"
option_map_or_none = "allow"
derivable_impls = "allow"
unwrap_used = "allow"
expect_used = "allow"
panic = "allow"
todo = "allow"
unimplemented = "allow"
unreachable = "allow"
