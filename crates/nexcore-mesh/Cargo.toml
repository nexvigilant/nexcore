[workspace]

[package]
name = "nexcore-mesh"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
repository = "https://github.com/nexvigilant/nexcore"
rust-version = "1.85"
description = "Runtime mesh networking with discovery, gossip, and resilience — grounded to 14/16 T1 primitives"

[dependencies]
nexcore-primitives = { version = "1.0.0", path = "../nexcore-primitives", registry = "nexcore" }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore" }
nexcore-cytokine = { version = "1.0.0", path = "../nexcore-cytokine", registry = "nexcore" }
nexcore-clearance = { version = "1.0.0", path = "../nexcore-clearance", registry = "nexcore" }
chrono = { version = "0.4.38", features = ["serde"] }
tokio = { version = "1.38.0", features = ["full", "sync", "time", "rt", "macros"] }
dashmap = { version = "6.0.1" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
uuid = { version = "1.10.0", features = ["v4", "serde"] }
thiserror = { version = "1.0.61" }
tracing = { version = "0.1.40" }

[dev-dependencies]
tokio = { version = "1.38.0", features = ["full", "sync", "time", "rt", "macros", "rt-multi-thread"] }

[lints.rust]
async_fn_in_trait = "allow"
dead_code = "allow"
unused_imports = "allow"
unused_variables = "allow"
unused_mut = "allow"
unused_assignments = "allow"
unused_must_use = "allow"

[lints.clippy]
all = "allow"
pedantic = "allow"
nursery = "allow"
cargo = "allow"
map_unwrap_or = "allow"
manual_map = "allow"
option_map_or_none = "allow"
derivable_impls = "allow"
unwrap_used = "allow"
expect_used = "allow"
panic = "allow"
todo = "allow"
unimplemented = "allow"
unreachable = "allow"
