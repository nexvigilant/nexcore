
[package]
name = "nexcore-hormones"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "MIT OR Apache-2.0"
repository.workspace = true
homepage.workspace = true
readme = "README.md"
