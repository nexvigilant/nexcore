[workspace]

[package]
name = "nexcore-error"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Zero-dependency error handling for NexVigilant Core ecosystem"
license = "MIT"
repository = "https://github.com/nexvigilant/nexcore"
keywords = ["error", "result", "no-std"]
categories = ["no-std", "rust-patterns"]

[dependencies]
# Zero external dependencies - supply chain sovereignty
# Replaces: thiserror, anyhow

[features]
default = ["std"]
std = []

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = "warn"
pedantic = "warn"
nursery = "warn"
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
