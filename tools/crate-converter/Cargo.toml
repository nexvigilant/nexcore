
[package]
name = "crate-converter"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Converts workspace-dependent Cargo.toml files to standalone packages for registry publishing"

[dependencies]
toml_edit = "0.22"
clap = { version = "4.5", features = ["derive"] }
nexcore-error = { workspace = true }
walkdir = "2.5"

[dev-dependencies]
pretty_assertions = "1.4"
