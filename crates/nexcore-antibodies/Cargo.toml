
[package]
name = "nexcore-antibodies"
version = "1.0.0"
edition = "2024"
rust-version = "1.85"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
description = "Adaptive immune layer for targeted threat recognition and neutralization. Complements nexcore-immunity (innate) with learned epitope-paratope binding."

[dependencies]
nexcore-error = { workspace = true }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
tracing = { version = "0.1.40" }
nexcore-chrono = { workspace = true }
nexcore-id = { workspace = true }
dashmap = { version = "6.0.1" }

[dev-dependencies]
tempfile = { version = "3.10.1" }

[lints]
workspace = true
