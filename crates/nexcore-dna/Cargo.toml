
[package]
name = "nexcore-dna"
version = "1.0.0"
edition = "2024"
rust-version = "1.85"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
description = "DNA-based computation: nucleotide types, data storage, biological operations, a 64-instruction Codon VM, assembler, and disassembler. Zero external dependencies."

[dependencies]
nexcore-edit-distance = { version = "1.0.0", path = "../nexcore-edit-distance", registry = "nexcore" }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
reqwest = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true }

[[bin]]
name = "dna"
path = "src/bin/dna.rs"


[lints]
workspace = true
