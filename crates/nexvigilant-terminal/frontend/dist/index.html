<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexVigilant Terminal</title>
  <style>
    :root {
      --bg-primary: #0a0e14;
      --bg-bar: #111822;
      --border: #2a3a4e;
      --text: #e0e8f0;
      --text-dim: #8899aa;
      --text-muted: #556677;
      --emerald: #34d399;
      --blue: #60a5fa;
      --red: #f87171;
      --font: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Noto Sans Mono', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: var(--bg-primary);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
    }
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    /* Title bar */
    .title-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 32px;
      padding: 0 12px;
      background: var(--bg-bar);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-dim);
      -webkit-app-region: drag;
      flex-shrink: 0;
      user-select: none;
    }
    .title-bar .left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .title-bar .brand {
      color: var(--emerald);
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .title-bar .right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    /* Status dot */
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-dot.connected {
      background: var(--emerald);
      box-shadow: 0 0 6px var(--emerald);
    }
    .status-dot.disconnected {
      background: var(--red);
      box-shadow: 0 0 6px var(--red);
    }
    /* Terminal fills everything */
    #terminal-container {
      flex: 1;
      padding: 4px;
      overflow: hidden;
    }
    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 24px;
      padding: 0 12px;
      background: var(--bg-bar);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .status-bar .left, .status-bar .right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    /* xterm.js overrides */
    .xterm { height: 100%; }
    .xterm-viewport { overflow-y: auto !important; }
    .xterm-viewport::-webkit-scrollbar { width: 8px; }
    .xterm-viewport::-webkit-scrollbar-track { background: var(--bg-primary); }
    .xterm-viewport::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
    .xterm-viewport::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }
  </style>
  <link rel="stylesheet" href="xterm.css" />
</head>
<body>
  <div class="app">
    <div class="title-bar">
      <div class="left">
        <span class="brand">NexVigilant Terminal</span>
        <span class="status-dot disconnected" id="connection-status" title="Disconnected"></span>
      </div>
      <div class="right">
        <span id="session-info">No session</span>
        <span id="terminal-size">--x--</span>
      </div>
    </div>
    <div id="terminal-container"></div>
    <div id="remote-panel-container"></div>
    <div class="status-bar">
      <div class="left">
        <span>NexVigilant Terminal v0.1.0</span>
      </div>
      <div class="right">
        <span>UTF-8</span>
        <span>bash</span>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
