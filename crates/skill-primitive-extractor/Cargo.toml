
[package]
name = "skill-primitive-extractor"
version = "0.1.0"
edition = "2024"
description = "Primitive extraction skill as a Rust crate"
license = "MIT OR Apache-2.0"
repository.workspace = true

[dependencies]
skill-core = { version = "0.1.0", path = "../skill-core" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva"}

[dev-dependencies]
tokio = { version = "1.0", features = ["rt-multi-thread", "macros"] }

[lints]
workspace = true
