[package]
name = "nexcore-web"
description = "Autonomous internet tools: HTTP fetch, HTML parsing, content extraction, link crawling, web search"
version = "0.1.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository.workspace = true
homepage.workspace = true
rust-version = "1.85"

keywords = ["nexcore", "web", "scraping", "http"]
categories = ["web-programming"]

[dependencies]
nexcore-error = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
scraper = "0.22"
url = "2"

[lints]
workspace = true
