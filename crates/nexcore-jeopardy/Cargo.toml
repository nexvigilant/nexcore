
[package]
name = "nexcore-jeopardy"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "MIT OR Apache-2.0"
repository.workspace = true
homepage.workspace = true
description = "Jeopardy!-inspired algorithm R&D investment optimizer using game theory primitives"

keywords = ["nexcore", "foundation", "primitives"]
categories = ["development-tools"]
[dependencies]
nexcore-error = { workspace = true }
nexcore-constants = { workspace = true }
nexcore-lex-primitiva = { workspace = true }
serde = { version = "1.0.204", features = ["derive"] }

[dev-dependencies]
serde_json = { version = "1.0.120" }

[lints]
workspace = true
