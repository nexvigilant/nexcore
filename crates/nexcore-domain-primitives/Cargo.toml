
[package]
name = "nexcore-domain-primitives"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Domain primitive extraction: tier taxonomy (T1/T2-P/T2-C/T3), dependency graphs, and cross-domain transfer confidence"
license = "MIT OR Apache-2.0"
publish = true
repository = "https://github.com/nexvigilant/nexcore"
homepage.workspace = true
keywords = ["primitives", "domain", "taxonomy", "transfer", "extraction"]
categories = ["algorithms", "science"]

[dependencies]
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }

[lints]
workspace = true
