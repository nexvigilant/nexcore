
[package]
name = "nexcore-compliance"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
rust-version = "1.85"
description = "Regulatory compliance engine: SAM.gov integration, OSCAL-inspired DSL, FDA/ICH/CIOMS controls"

[lib]
name = "nexcore_compliance"
path = "src/lib.rs"

[dependencies]
# Workspace dependencies
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore" }
thiserror = { version = "1.0.61" }
tracing = { version = "0.1.40" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
chrono = { version = "0.4.38", features = ["serde"] }

# HTTP client for SAM.gov API
reqwest = { version = "0.12", features = ["json"] }

[dev-dependencies]
proptest = { version = "1.6.0" }
tempfile = { version = "3.10.1" }

[lints.rust]
async_fn_in_trait = "allow"
dead_code = "allow"
unused_imports = "allow"
unused_variables = "allow"
unused_mut = "allow"
unused_assignments = "allow"
unused_must_use = "allow"

[lints.clippy]
all = "allow"
pedantic = "allow"
nursery = "allow"
cargo = "allow"
map_unwrap_or = "allow"
manual_map = "allow"
option_map_or_none = "allow"
derivable_impls = "allow"
unwrap_used = "allow"
expect_used = "allow"
panic = "allow"
todo = "allow"
unimplemented = "allow"
unreachable = "allow"
