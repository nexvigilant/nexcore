# cargo-deny configuration for NexCore workspace (v0.19)
# Run: cargo deny check

[graph]
targets = []
all-features = false
no-default-features = false

[advisories]
# All ignored advisories have "No safe upgrade available" as of 2026-02-23.
# Re-check weekly via `cargo deny check advisories` (cron: Mon 2am).
ignore = [
    "RUSTSEC-2025-0141",  # fast-float: unsound parsing
    "RUSTSEC-2025-0003",  # rustls-pemfile: unmaintained
    "RUSTSEC-2025-0119",  # no safe upgrade
    "RUSTSEC-2024-0436",  # no safe upgrade
    "RUSTSEC-2025-0134",  # no safe upgrade
]

[licenses]
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "OpenSSL",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "LicenseRef-Proprietary",
    "LicenseRef-NexVigilant-Proprietary",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = true
registries = ["https://crates.nexvigilant.com/api/v1/crates/"]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
deny = [
    { crate = "openssl-sys", wrappers = ["native-tls", "openssl"], reason = "use rustls instead — allowed transitively via native-tls until reqwest migration" },
]
skip = [
    { crate = "syn@1", reason = "proc-macro crates still on syn 1.x" },
    { crate = "bitflags@1", reason = "transitive dep ecosystem transition" },
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
    "https://index.crates.io",
]
allow-git = []
