
[package]
name = "nexcloud"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
repository = "https://github.com/nexvigilant/nexcore"
rust-version = "1.85"
description = "Rust-native cloud platform: 35-type taxonomy + process supervisor + reverse proxy"

[[bin]]
name = "nexcloud"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

[dependencies]
nexcore-error = { workspace = true }
tokio = { version = "1.38.0", features = ["full"] }
hyper = { version = "1.5", features = ["http1", "http2", "server"] }
hyper-util = { version = "0.1", features = ["tokio"] }
http-body-util = "0.1.2"
rustls = "0.23"
tokio-rustls = "0.26"
rustls-pki-types = "1.10"
rustls-pemfile = "2.2"
reqwest = { version = "0.12.5", features = ["json"] }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = "1.0.120"
toml = "0.8.15"
tracing = "0.1.40"
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }
clap = { version = "4.5.11", features = ["derive", "cargo", "env"] }
dashmap = "6.0.1"
nexcore-chrono = { workspace = true }
bytes = "1.6.1"
http = "1.2"
nix = { version = "0.29", features = ["signal", "process", "fs", "mount", "reboot", "hostname"] }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore" }

[dev-dependencies]
tempfile = "3.10.1"


[lints]
workspace = true
