
[package]
name = "nexcore-network"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "NexCore OS networking subsystem — connection management, DNS, firewall, routing, monitoring"
authors = ["Matthew Campion, PharmD <matthew@nexvigilant.com>"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/nexvigilant/nexcore"
homepage.workspace = true
keywords = ["networking", "dns", "firewall", "routing", "os"]
categories = ["network-programming", "os"]

[dependencies]
nexcore-error = { workspace = true }
serde = { version = "1.0.204", features = ["derive"] }
nexcore-chrono = { workspace = true }


[lints]
workspace = true
