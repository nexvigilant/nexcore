
[package]
name = "nexcore-signal-pipeline"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/nexvigilant/nexcore"
homepage.workspace = true
rust-version = "1.85"
description = "PV signal detection pipeline: ingest, normalize, detect, threshold, store, alert, report, stats, orchestrate"

keywords = ["nexcore", "pharmacovigilance", "drug-safety"]
categories = ["science"]
[dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
nexcore-cargo = { workspace = true }
nexcore-chrono = { workspace = true }
nexcore-id = { workspace = true, features = ["serde"] }
nexcore-lex-primitiva = { workspace = true }
nexcore-primitives = { workspace = true }
nexcore-signal-types = { workspace = true }
nexcore-signal-theory = { workspace = true }
stem-math = { workspace = true }
axum = { workspace = true, features = ["macros"] }
tokio = { workspace = true, features = ["full"] }
bytes = { workspace = true }
nexcore-error = { workspace = true }
phf = { workspace = true, features = ["macros"] }

[dev-dependencies]
tower = { workspace = true, features = ["full"] }
http-body-util = { workspace = true }

[lints]
workspace = true
