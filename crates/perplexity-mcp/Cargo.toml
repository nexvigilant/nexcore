
[package]
name = "perplexity-mcp"
version = "1.0.0"
edition = "2024"
rust-version = "1.85"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository.workspace = true
homepage.workspace = true
description = "MCP server for Perplexity AI search-grounded research with citations"

keywords = ["nexcore", "mcp", "api"]
categories = ["web-programming"]
[[bin]]
name = "perplexity-mcp"
path = "src/main.rs"

[dependencies]
nexcore-perplexity = { version = "1.0.0", path = "../nexcore-perplexity" }
rmcp = { version = "0.14", features = ["server", "transport-io"] }
schemars = "1.2"
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
tokio = { version = "1.38.0", features = ["full"] }
nexcore-error = { workspace = true, features = ["mcp", "tokio_runtime", "tracing_filter"] }

[dev-dependencies]
serde_json = { version = "1.0.120" }


[lints]
workspace = true
