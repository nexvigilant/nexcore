[workspace]

[package]
name = "prima"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "LicenseRef-Proprietary"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
description = "Prima - A primitive-first programming language grounded in Lex Primitiva"
keywords = ["language", "primitives", "interpreter", "type-theory", "grounding"]
categories = ["compilers", "development-tools"]

[lib]
path = "src/lib.rs"

[[bin]]
name = "prima"
path = "src/bin/prima.rs"

[dependencies]
lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore", package = "nexcore-lex-primitiva" }
clap = { version = "4.5.11", features = ["derive", "cargo", "env"] }
thiserror = { version = "1.0.61" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
rustyline = "14"

[dev-dependencies]
proptest = { version = "1.6.0" }
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "compression"
harness = false

[lints.rust]
async_fn_in_trait = "allow"
dead_code = "allow"
unused_imports = "allow"
unused_variables = "allow"
unused_mut = "allow"
unused_assignments = "allow"
unused_must_use = "allow"

[lints.clippy]
all = "allow"
pedantic = "allow"
nursery = "allow"
cargo = "allow"
map_unwrap_or = "allow"
manual_map = "allow"
option_map_or_none = "allow"
derivable_impls = "allow"
unwrap_used = "allow"
expect_used = "allow"
panic = "allow"
todo = "allow"
unimplemented = "allow"
unreachable = "allow"
