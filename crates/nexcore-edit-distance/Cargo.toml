
[package]
name = "nexcore-edit-distance"
description = "Generic edit distance framework: pluggable operations, cost models, and solvers"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
rust-version = "1.85"

[dependencies]
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore" }
stem-math = { version = "0.1.0", path = "../stem-math", registry = "nexcore" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }

[dev-dependencies]
proptest = { version = "1.6.0" }
criterion = { version = "0.5", features = ["html_reports"] }

[lints]
workspace = true
