
[package]
name = "nexcore-word"
description = "Foundation binary word algorithms: typed newtypes (Word8-Word64) with composable trait algebra grounded to State (ς)"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "MIT OR Apache-2.0"
repository.workspace = true
homepage.workspace = true
rust-version = "1.85"

keywords = ["nexcore", "foundation", "primitives"]
categories = ["development-tools"]
[dependencies]
nexcore-error = { workspace = true }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }

[dev-dependencies]
proptest = { version = "1.6.0" }


[lints]
workspace = true
