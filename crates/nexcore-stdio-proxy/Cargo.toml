
[package]
name = "nexcore-stdio-proxy"
version = "1.0.0"
edition = "2024"
rust-version = "1.85"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "MIT OR Apache-2.0"
repository.workspace = true
homepage.workspace = true
description = "Generic stdio proxy with hot-reload — protocol-agnostic child process management"

keywords = ["nexcore", "mcp", "api"]
categories = ["web-programming"]
[dependencies]
nexcore-error = { workspace = true }
tokio = { version = "1.38.0", features = ["full"] }
tracing = { version = "0.1.40" }
notify = { version = "8.2.0" }

[dev-dependencies]
tempfile = { version = "3.10.1" }


[lints]
workspace = true
