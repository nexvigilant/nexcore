
[package]
name = "nexcore-tov"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository = "https://github.com/nexvigilant/nexcore"
homepage.workspace = true
readme = "README.md"
description = "Theory of Vigilance: grounded primitives and Curry-Howard proof verification"
keywords = ["vigilance", "proof-verification", "curry-howard", "type-theory"]
categories = ["algorithms", "science", "mathematics"]

[dependencies]
nexcore-error = { workspace = true }
serde = { version = "1.0.204", features = ["derive"] }
nexcore-constants = { version = "1.0.0", path = "../nexcore-constants" }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }
typenum = { version = "1.17.0" }

[dev-dependencies]
tokio = { version = "1.47", features = ["full"] }

[features]
kani = []


[lints]
workspace = true
