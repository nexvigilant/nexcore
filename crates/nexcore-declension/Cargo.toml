
[package]
name = "nexcore-declension"
version = "1.0.0"
edition = "2024"
rust-version = "1.85"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
description = "Latin-inspired architectural primitives — declension classes, component cases, inflected tools, pro-drop inference, and agreement checking"
license = "MIT OR Apache-2.0"
repository.workspace = true
homepage.workspace = true

keywords = ["nexcore", "machine-learning", "ai"]
categories = ["science", "algorithms"]
[dependencies]
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }

[lints]
workspace = true
