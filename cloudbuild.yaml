# Cloud Build configuration for NexCore API
# Deploy to Cloud Run with live signal screening

steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/nexcore-api:$COMMIT_SHA', '.']

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/nexcore-api:$COMMIT_SHA']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'nexcore-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/nexcore-api:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'  # Change to --no-allow-unauthenticated for private API
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '${_MIN_INSTANCES}'  # Set to 1 for always-warm (no cold starts)
      - '--max-instances'
      - '10'
      - '--timeout'
      - '60s'
      - '--concurrency'
      - '80'
      - '--set-env-vars'
      - 'RUST_LOG=nexcore_api=info'

# Tag the image as latest
images:
  - 'gcr.io/$PROJECT_ID/nexcore-api:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/nexcore-api:latest'

# Substitution defaults
substitutions:
  _REGION: 'us-central1'
  _MIN_INSTANCES: '0'  # Set to '1' for always-on (eliminates cold starts, costs more)

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'
