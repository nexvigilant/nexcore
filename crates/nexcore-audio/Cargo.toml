[workspace]

[package]
name = "nexcore-audio"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "NexCore Audio — OS audio subsystem with PCM formats, mixing, and streaming"
authors = ["Matthew Campion, PharmD <matthew@nexvigilant.com>"]
license = "LicenseRef-NexVigilant-Proprietary"
repository = "https://github.com/nexvigilant/nexcore"
keywords = ["audio", "pcm", "mixer", "streaming", "os"]
categories = ["multimedia::audio"]

[dependencies]
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = "warn"
pedantic = "warn"
nursery = "warn"
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
module_name_repetitions = "allow"
doc_markdown = "allow"
missing_const_for_fn = "allow"
cast_possible_truncation = "allow"
cast_precision_loss = "allow"
cast_sign_loss = "allow"
cast_lossless = "allow"
return_self_not_must_use = "allow"
suboptimal_flops = "allow"
option_if_let_else = "allow"
significant_drop_tightening = "allow"
