
[package]
name = "nexcore-audio"
version = "0.1.1"
edition = "2024"
rust-version = "1.85"
description = "NexCore Audio — OS audio subsystem with PCM formats, mixing, and streaming"
authors = ["Matthew Campion, PharmD <matthew@camp-corp.com>"]
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository = "https://github.com/nexvigilant/nexcore"
homepage.workspace = true
keywords = ["audio", "pcm", "mixer", "streaming", "os"]
categories = ["multimedia::audio"]

[[bin]]
name = "nexcore-vad"
path = "src/bin/vad_cli.rs"

[[bin]]
name = "nexcore-stt"
path = "src/bin/stt_cli.rs"

[[bin]]
name = "nexcore-transcribe"
path = "src/bin/transcribe_cli.rs"

[dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

[lints]
workspace = true
