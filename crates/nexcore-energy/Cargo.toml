
[package]
name = "nexcore-energy"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Token-as-energy system modeled on ATP/ADP biochemistry (Atkinson Energy Charge)"
license = "MIT"
repository = "https://github.com/nexvigilant/nexcore"
keywords = ["tokens", "energy", "atp", "biochemistry", "budget"]
categories = ["algorithms", "science"]

[dependencies]
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = "warn"
pedantic = "warn"
nursery = "warn"
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
module_name_repetitions = "allow"
doc_markdown = "allow"
missing_const_for_fn = "allow"
cast_possible_truncation = "allow"
option_if_let_else = "allow"
significant_drop_tightening = "allow"
