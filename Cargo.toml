[workspace.lints.rust]
unsafe_code = "forbid"
async_fn_in_trait = "allow"
dead_code = "allow"
unused_imports = "allow"
unused_variables = "allow"
unused_mut = "allow"
unused_assignments = "allow"
unused_must_use = "allow"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
cargo = { level = "warn", priority = -1 }
# Safety: deny unwrap/expect/panic workspace-wide
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
# Ergonomic allows (common false positives)
map_unwrap_or = "allow"
manual_map = "allow"
option_map_or_none = "allow"
derivable_impls = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
module_name_repetitions = "allow"
doc_markdown = "allow"
missing_const_for_fn = "allow"
cast_possible_truncation = "allow"
cast_precision_loss = "allow"
cast_sign_loss = "allow"
cast_lossless = "allow"
option_if_let_else = "allow"
significant_drop_tightening = "allow"
todo = "allow"
unimplemented = "allow"
unreachable = "allow"
multiple_crate_versions = "allow"
# New Rust 1.93 pedantic lints (mass migration deferred)
format_push_string = "allow"
case_sensitive_file_extension_comparisons = "allow"
manual_async_fn = "allow"
manual_div_ceil = "allow"
redundant_closure = "allow"
collapsible_if = "allow"
needless_for_each = "allow"
single_char_pattern = "allow"
cast_possible_wrap = "allow"
# once_cell → LazyLock migration (deferred)
type_complexity = "allow"
useless_format = "allow"
suboptimal_flops = "allow"
assigning_clones = "allow"
manual_is_power_of_two = "allow"
field_reassign_with_default = "allow"
redundant_pattern_matching = "allow"
let_and_return = "allow"
match_like_matches_macro = "allow"
iter_over_hash_type = "allow"
manual_is_ascii_check = "allow"
io_other_error = "allow"
manual_saturating_arithmetic = "allow"
clone_on_copy = "allow"
unnested_or_patterns = "allow"
non_std_lazy_statics = "allow"
or_fun_call = "allow"
unnecessary_map_or = "allow"
redundant_guards = "allow"
derive_partial_eq_without_eq = "allow"
needless_question_mark = "allow"
doc_lazy_continuation = "allow"
manual_clamp = "allow"
imprecise_flops = "allow"
manual_midpoint = "allow"
needless_range_loop = "allow"
explicit_iter_loop = "allow"
unreadable_literal = "allow"
redundant_continue = "allow"
trait_duplication_in_bounds = "allow"
repeat_vec = "allow"
sort_unstable = "allow"
cargo_common_metadata = "allow"
# Pre-existing across workspace — allow to unblock validate-seq
needless_collect = "allow"
needless_pass_by_value = "allow"
needless_pass_by_ref_mut = "allow"
should_implement_trait = "allow"
unnecessary_wraps = "allow"
unused_self = "allow"
return_self_not_must_use = "allow"
manual_let_else = "allow"
redundant_closure_for_method_calls = "allow"
items_after_statements = "allow"
struct_excessive_bools = "allow"
fn_params_excessive_bools = "allow"
too_many_lines = "allow"
cognitive_complexity = "allow"
similar_names = "allow"
struct_field_names = "allow"
wildcard_imports = "allow"
used_underscore_binding = "allow"
implicit_hasher = "allow"
match_wildcard_for_single_variants = "allow"
match_same_arms = "allow"
single_match_else = "allow"
if_not_else = "allow"
redundant_else = "allow"
uninlined_format_args = "allow"
use_self = "allow"
default_trait_access = "allow"
trivially_copy_pass_by_ref = "allow"
enum_glob_use = "allow"
manual_string_new = "allow"
unnecessary_lazy_evaluations = "allow"
match_bool = "allow"
len_without_is_empty = "allow"
iter_without_into_iter = "allow"
from_over_into = "allow"
