
[package]
name = "nexcore-ctvp"
version = "1.0.0"
edition = "2024"
rust-version = "1.85"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
description = "Clinical Trial Validation Paradigm (CTVP) - Software validation using pharmaceutical methodology"

[features]
default = ["drift", "testcontainers"]
drift = []
testcontainers = []
llm = ["dep:reqwest", "dep:tokio"]

[dependencies]
nexcore-error = { workspace = true }
# Core
stem-core = { version = "0.1.0", path = "../stem-core", registry = "nexcore" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
chrono = { version = "0.4.38", features = ["serde"] }
nexcore-id = { workspace = true }

# Async runtime (optional for LLM)
tokio = { version = "1.38.0", features = ["full"], optional = true }

# HTTP client for LLM integration
reqwest = { version = "0.12.5", features = ["json"], optional = true }

# File parsing
nexcore-fs = { workspace = true }
glob = { version = "0.3.1" }
regex = { version = "1.10.5" }
toml = { version = "0.8.15" }

# Logging
tracing = { version = "0.1.40" }
ordered-float = "5.1.0"

[dev-dependencies]
proptest = { version = "1.6.0" }
tempfile = { version = "3.10.1" }

[lib]
name = "nexcore_ctvp"
path = "src/lib.rs"

[[bin]]
name = "ctvp-cli"
path = "src/bin/ctvp_cli.rs"

[lints.rust]
async_fn_in_trait = "allow"
dead_code = "allow"
unused_imports = "allow"
unused_variables = "allow"
unused_mut = "allow"
unused_assignments = "allow"
unused_must_use = "allow"

[lints.clippy]
all = "allow"
pedantic = "allow"
nursery = "allow"
cargo = "allow"
map_unwrap_or = "allow"
manual_map = "allow"
option_map_or_none = "allow"
derivable_impls = "allow"
unwrap_used = "allow"
expect_used = "allow"
panic = "allow"
todo = "allow"
unimplemented = "allow"
unreachable = "allow"
