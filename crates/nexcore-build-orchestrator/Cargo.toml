
[package]
name = "nexcore-build-orchestrator"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
description = "Full-stack build orchestrator with CI/CD pipeline, live dashboard, and CLI"

[[bin]]
name = "build-orchestrator"
path = "src/main.rs"
required-features = ["ssr"]

[[bin]]
name = "orchestrator-cli"
path = "bin/orchestrator_cli.rs"

[dependencies]
nexcore-error = { workspace = true }
# Workspace (always)
nexcore-build-gate = { version = "1.0.0", path = "../nexcore-build-gate", registry = "nexcore" }
nexcore-measure = { version = "1.0.0", path = "../nexcore-measure", registry = "nexcore" }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
nexcore-chrono = { workspace = true }
tracing = { version = "0.1.40" }
sha2 = { version = "0.10.8" }
nexcore-fs = { workspace = true }
clap = { version = "4.5.11", features = ["derive", "cargo", "env"] }

# SSR-only (optional, workspace)
tokio = { version = "1.38.0", features = ["full"], optional = true }
tokio-stream = { version = "0.1.15", optional = true }
tracing-subscriber = { version = "0.3.18", features = ["env-filter"], optional = true }

# SSR-only (direct, NOT workspace — Axum 0.7 for Leptos compat)
axum = { version = "0.7", optional = true }
tower = { version = "0.5", optional = true }
tower-http = { version = "0.6", features = ["fs", "cors"], optional = true }
leptos = { version = "0.7", optional = true }
leptos_router = { version = "0.7", optional = true }
leptos_meta = { version = "0.7", optional = true }
leptos_axum = { version = "0.7", optional = true }

[features]
default = []
ssr = [
    "leptos/ssr", "leptos_router/ssr", "leptos_meta/ssr",
    "dep:leptos", "dep:leptos_router", "dep:leptos_meta", "dep:leptos_axum",
    "dep:axum", "dep:tokio", "dep:tokio-stream",
    "dep:tower", "dep:tower-http", "dep:tracing-subscriber",
]


[lints]
workspace = true
