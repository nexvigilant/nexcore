
[package]
name = "nexcore-compilation-space"
version = "0.1.0"
edition = "2024"
description = "The Full Compilation Space — 7-axis framework for modeling code transformations"
license = "LicenseRef-NexVigilant-Proprietary"

[dependencies]
serde = { version = "1.0.204", features = ["derive"] }
stem-math = { version = "0.1.0", path = "../stem-math", registry = "nexcore" }

[lints.rust]
async_fn_in_trait = "allow"
dead_code = "allow"
unused_imports = "allow"
unused_variables = "allow"
unused_mut = "allow"
unused_assignments = "allow"
unused_must_use = "allow"

[lints.clippy]
all = "allow"
pedantic = "allow"
nursery = "allow"
cargo = "allow"
map_unwrap_or = "allow"
manual_map = "allow"
option_map_or_none = "allow"
derivable_impls = "allow"
unwrap_used = "allow"
expect_used = "allow"
panic = "allow"
todo = "allow"
unimplemented = "allow"
unreachable = "allow"
