[workspace]

[package]
name = "nexcore-docs-mcp"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
description = "MCP server for Claude Code documentation - consolidated from projects/claude-code-docs-mcp"

[[bin]]
name = "nexcore-docs-mcp"
path = "src/main.rs"

[dependencies]
nexcore-constants = { version = "1.0.0", path = "../nexcore-constants", registry = "nexcore" }

# MCP SDK
rmcp = { version = "0.14", features = ["server", "transport-io"] }
tokio = { version = "1.38.0", features = ["full"] }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }

# HTTP client for fetching docs
reqwest = { version = "0.12", features = ["json"] }
anyhow = { version = "1.0.86" }

# Caching
moka = { version = "0.12", features = ["future"] }

[lints.rust]
async_fn_in_trait = "allow"
dead_code = "allow"
unused_imports = "allow"
unused_variables = "allow"
unused_mut = "allow"
unused_assignments = "allow"
unused_must_use = "allow"

[lints.clippy]
all = "allow"
pedantic = "allow"
nursery = "allow"
cargo = "allow"
map_unwrap_or = "allow"
manual_map = "allow"
option_map_or_none = "allow"
derivable_impls = "allow"
unwrap_used = "allow"
expect_used = "allow"
panic = "allow"
todo = "allow"
unimplemented = "allow"
unreachable = "allow"
