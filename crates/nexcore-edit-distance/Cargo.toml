
[package]
name = "nexcore-edit-distance"
description = "Generic edit distance framework: pluggable operations, cost models, and solvers"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository.workspace = true
homepage.workspace = true
rust-version = "1.85"

keywords = ["nexcore", "machine-learning", "ai"]
categories = ["science", "algorithms"]
[dependencies]
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }
stem-math = { version = "0.1.0", path = "../stem-math" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }

[dev-dependencies]
proptest = { version = "1.6.0" }
criterion = { version = "0.5", features = ["html_reports"] }

[lints]
workspace = true
