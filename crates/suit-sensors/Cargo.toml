[package]
name = "suit-sensors"
version = "0.1.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
description = "Raw sensor hardware abstraction — IMU, force plates, strain gauges, and pilot biometrics"
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository.workspace = true
homepage.workspace = true

keywords = ["sensors", "imu", "biometrics", "hardware"]
categories = ["embedded", "hardware-support"]

[dependencies]
nexcore-error = { workspace = true }
suit-primitives = { path = "../suit-primitives", version = "0.1.0" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

[lints]
workspace = true
