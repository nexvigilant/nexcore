[workspace]
members = [
    "crates/*",
    "tools/*",
]
exclude = [
]
resolver = "2"

[workspace.package]
version = "1.0.0"
edition = "2024"
rust-version = "1.85"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
description = "NexVigilant Core (nexcore) — The Vigilance Kernel for pharmacovigilance and intelligent automation"
license = "LicenseRef-Proprietary"
repository = "https://github.com/nexvigilant/nexcore"

[workspace.dependencies]
axum = { version = "0.8.0", features = ["macros", "ws"] }
tokio = { version = "1.38.0", features = ["full"] }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = "1.0.120"
chrono = { version = "0.4.38", features = ["serde"] }
uuid = { version = "1.10.0", features = ["v4", "serde"] }
anyhow = "1.0.86"
tracing = "0.1.40"
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }
tower-http = { version = "0.5.2", features = ["cors", "trace", "compression-full"] }
utoipa = { version = "5.3", features = ["axum_extras", "chrono", "uuid"] }
reqwest = { version = "0.12.5", features = ["json"] }
futures = "0.3.30"
regex = "1.10.5"
dashmap = "6.0.1"
tempfile = "3.10.1"
thiserror = "1.0.61"
rusqlite = { version = "0.32", features = ["bundled", "serde_json"] }
clap = { version = "4.5.11", features = ["derive", "cargo", "env"] }
async-trait = "0.1.81"
dirs = "5.0.1"
base64 = "0.22.1"
walkdir = "2.5.0"
glob = "0.3.1"
toml = "0.8.15"
rayon = "1.10.0"
sha2 = "0.10.8"
hex = "0.4.3"
once_cell = "1.19.0"
flate2 = "1.0.30"
tar = "0.4.41"
url = "2.5.2"
urlencoding = "2.1.3"
phf = { version = "0.11.2", features = ["macros"] }
bytes = "1.6.1"
http-body-util = "0.1.2"
serde_yaml = "0.9.34"
toml_edit = "0.22.16"
csv = "1.3.0"
tokio-stream = "0.1.15"
tower = { version = "0.4.13", features = ["full"] }
syn = { version = "2.0.71", features = ["full"] }
quote = "1.0.36"
proc-macro2 = "1.0.86"
darling = "0.20.10"
proptest = "1.6.0"
criterion = { version = "0.5", features = ["html_reports"] }
colored = "3.0.0"
rand = "0.9.0"
polars = { version = "0.44", features = ["lazy", "csv", "json"] }
typenum = "1.17.0"
notify = "8.2.0"
jsonwebtoken = "9"
nix = { version = "0.29", features = ["signal", "process", "fs", "mount", "reboot", "hostname"] }
ordered-float = { version = "4", features = ["serde"] }

# Candle ML ecosystem (HuggingFace, pure-Rust inference)
candle-core = "0.9"
candle-nn = "0.9"
candle-transformers = "0.9"
hf-hub = { version = "0.4", default-features = false, features = ["ureq"] }
tokenizers = "0.22"

rustyline = "14"

# Internal Workspace Dependencies (Prima)
prima = { path = "crates/prima" }
prima-codegen = { path = "crates/prima-codegen" }
prima-academy = { path = "crates/prima-academy" }
prima-chem = { path = "crates/prima-chem" }
