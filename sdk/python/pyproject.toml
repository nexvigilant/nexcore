[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nexcore-sdk"
dynamic = ["version"]
description = "Python SDK for NexVigilant's NexCore pharmacovigilance platform"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "NexVigilant", email = "matt@nexvigilant.com" },
]
keywords = ["pharmacovigilance", "signal-detection", "faers", "pv", "mcp"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Healthcare Industry",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Medical Science Apps.",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.25.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-httpx>=0.30.0",
    "ruff>=0.4.0",
]

[project.urls]
Homepage = "https://nexvigilant.com"
Documentation = "https://docs.nexvigilant.com/sdk/python"
Repository = "https://github.com/nexvigilant/nexcore"

[tool.hatch.version]
path = "nexcore_sdk/_version.py"

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.pytest.ini_options]
testpaths = ["tests"]
