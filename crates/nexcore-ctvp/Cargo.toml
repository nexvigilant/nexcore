
[package]
name = "nexcore-ctvp"
version = "1.0.0"
edition = "2024"
rust-version = "1.85"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository.workspace = true
homepage.workspace = true
description = "Clinical Trial Validation Paradigm (CTVP) - Software validation using pharmaceutical methodology"

keywords = ["nexcore", "pharmacovigilance", "drug-safety"]
categories = ["science"]
[features]
default = ["drift", "testcontainers"]
drift = []
testcontainers = []
llm = ["dep:reqwest", "dep:tokio"]

[dependencies]
nexcore-error = { workspace = true }
# Core
stem-core = { version = "0.1.0", path = "../stem-core" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
nexcore-chrono = { workspace = true }
nexcore-id = { workspace = true }

# Async runtime (optional for LLM)
tokio = { version = "1.38.0", features = ["full"], optional = true }

# HTTP client for LLM integration
reqwest = { version = "0.12.5", features = ["json"], optional = true }

# File parsing
nexcore-fs = { workspace = true }
glob = { version = "0.3.1" }
regex = { version = "1.10.5" }
toml = { version = "0.8.15" }

# Logging
tracing = { version = "0.1.40" }
ordered-float = "5.1.0"

[dev-dependencies]
proptest = { version = "1.6.0" }
tempfile = { version = "3.10.1" }

[lib]
name = "nexcore_ctvp"
path = "src/lib.rs"

[[bin]]
name = "ctvp-cli"
path = "src/bin/ctvp_cli.rs"


[lints]
workspace = true
