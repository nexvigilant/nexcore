
[package]
name = "skill-core"
version = "0.1.0"
edition = "2024"
description = "Core traits and types for Claude Code skills as Rust crates"
license = "MIT"

[dependencies]
nexcore-error = { workspace = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
regex = "1.11"
tokio = { version = "1.0", features = ["rt", "macros"] }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore" }

[dev-dependencies]
tokio = { version = "1.0", features = ["rt-multi-thread", "macros"] }
