
[package]
name = "nexcore-reproductive"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "MIT OR Apache-2.0"
repository.workspace = true
homepage.workspace = true
description = "Reproductive system for CI/CD — Gametes(build artifacts) + Fertilization(merge/test) + Trimester gates(validation phases) + Differentiation(env adaptation) + Birth(deployment)"

keywords = ["nexcore", "infrastructure", "configuration"]
categories = ["development-tools"]
[dependencies]
nexcore-chrono = { workspace = true }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }

[lints]
workspace = true
