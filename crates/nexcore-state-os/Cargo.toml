
[package]
name = "nexcore-state-os"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "State Operating System — 15-layer runtime for state machine orchestration"
authors = ["Matthew Campion, PharmD <matthew@camp-corp.com>"]
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository = "https://github.com/nexvigilant/nexcore"
homepage.workspace = true
readme = "README.md"
keywords = ["state-machine", "operating-system", "orchestration", "runtime"]
categories = ["data-structures", "asynchronous"]

[dependencies]
nexcore-state-theory = { version = "0.1.0", path = "../nexcore-state-theory" }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", optional = true }
serde = { workspace = true }

[dev-dependencies]
# proptest removed: no property tests exist yet. Re-add when implementing
# property tests for arbitrary event sequences on MachineInstance.

[features]
default = ["std"]
std = []
grounding = ["dep:nexcore-lex-primitiva"]

[lints]
workspace = true
