
[package]
name = "nexcore-os"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "NexCore OS — Operating system core runtime with STOS-based boot sequence"
authors = ["Matthew Campion, PharmD <matthew@nexvigilant.com>"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/nexvigilant/nexcore"
homepage.workspace = true
readme = "README.md"
keywords = ["os", "runtime", "boot", "state-machine", "operating-system"]
categories = ["os", "embedded"]

[dependencies]
nexcore-error = { workspace = true }
nexcore-pal = { version = "0.1.0", path = "../nexcore-pal" }
nexcore-network = { version = "0.1.0", path = "../nexcore-network" }
nexcore-audio = { version = "0.1.0", path = "../nexcore-audio" }
nexcore-state-os = { version = "0.1.0", path = "../nexcore-state-os" }
nexcore-cytokine = { version = "1.0.0", path = "../nexcore-cytokine" }
nexcore-energy = { version = "0.1.0", path = "../nexcore-energy" }
nexcore-clearance = { version = "1.0.0", path = "../nexcore-clearance" }
nexcore-vault = { version = "1.0.0", path = "../nexcore-vault" }
nexcore-brain = { version = "1.0.0", path = "../nexcore-brain" }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }
nexcore-trust = { version = "0.1.0", path = "../nexcore-trust" }
nexcore-pal-linux = { version = "0.1.0", path = "../nexcore-pal-linux" }
nexcore-hash = { workspace = true }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
tracing = { version = "0.1.40" }
nexcore-chrono = { workspace = true }
nexcore-fs = { workspace = true }
nexcore-tov = { version = "1.0.0", path = "../nexcore-tov" }
nexcore-primitives = { version = "1.0.0", path = "../nexcore-primitives" }
nexcore-dtree = { version = "1.0.0", path = "../nexcore-dtree" }
nexcore-ribosome = { version = "1.0.0", path = "../nexcore-ribosome" }
nexcore-pv-core = { version = "1.0.0", path = "../nexcore-pv-core" }
nexcore-id = { version = "0.1.0", path = "../nexcore-id", features = ["serde"] }
antitransformer = { version = "1.0.0", path = "../antitransformer" }
stem-math = { version = "0.1.0", path = "../stem-math" }
nexcore-integumentary = { version = "1.0.0", path = "../nexcore-integumentary" }
nexcore-skeletal = { version = "1.0.0", path = "../nexcore-skeletal" }
nexcore-muscular = { version = "1.0.0", path = "../nexcore-muscular" }
nexcore-circulatory = { version = "1.0.0", path = "../nexcore-circulatory" }
nexcore-respiratory = { version = "1.0.0", path = "../nexcore-respiratory" }
nexcore-digestive = { version = "1.0.0", path = "../nexcore-digestive" }
nexcore-lymphatic = { version = "1.0.0", path = "../nexcore-lymphatic" }
nexcore-nervous = { version = "1.0.0", path = "../nexcore-nervous" }
nexcore-hormones = { version = "1.0.0", path = "../nexcore-hormones" }
nexcore-urinary = { version = "1.0.0", path = "../nexcore-urinary" }
nexcore-reproductive = { version = "1.0.0", path = "../nexcore-reproductive" }
nexcore-browser = { version = "0.1.0", path = "../nexcore-browser", optional = true }
nexcore-insight = { version = "0.1.0", path = "../nexcore-insight", optional = true }
reqwest = { workspace = true }
dashmap = "6.0.1"
async-trait = "0.1.81"
toml = "0.8.15"
tokio = { version = "1.38.0", features = ["rt-multi-thread", "macros", "sync"] }

[features]
default = ["insight"]
insight = ["dep:nexcore-insight"]
browser = ["dep:nexcore-browser"]

[dev-dependencies]
nexcore-pal-linux = { version = "0.1.0", path = "../nexcore-pal-linux" }
tempfile = { version = "3.10.1" }


[lints]
workspace = true
