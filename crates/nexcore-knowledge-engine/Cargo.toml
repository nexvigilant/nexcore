[package]
name = "nexcore-knowledge-engine"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "MIT OR Apache-2.0"
repository.workspace = true
homepage.workspace = true
description = "Knowledge compression, compilation, and query engine for structured knowledge packs"

keywords = ["nexcore", "knowledge-management", "automation"]
categories = ["development-tools"]
[dependencies]
nexcore-error = { workspace = true }
nexcore-lex-primitiva = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
nexcore-chrono = { workspace = true }
nexcore-id = { workspace = true }
nexcore-fs = { workspace = true }

[lints]
workspace = true
