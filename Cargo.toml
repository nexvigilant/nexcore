[workspace]
members = [
    "crates/claude-knowledge-mcp",
    "crates/*",
    "tools/*",
]
exclude = [
    "crates/nexcore-claude-hooks",
    "crates/nexcore-hooks",
    "crates/word-spectroscopy",
    "crates/nexcore-bridge-mcp",
]
resolver = "2"

[workspace.package]
version = "1.0.0"
edition = "2024"
rust-version = "1.85"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
description = "NexVigilant Core (nexcore) — The Vigilance Kernel for pharmacovigilance and intelligent automation"
license = "MIT OR Apache-2.0"
repository = "https://github.com/nexvigilant/nexcore"
homepage = "https://nexvigilant.com"
readme = "README.md"

[workspace.dependencies]
# anyhow — REMOVED: replaced by nexcore-error
axum = { version = "0.8.0", features = ["macros", "ws"] }
dag-publish = { path = "tools/dag-publish" }
# base64 — REPLACED by nexcore-codec (sovereignty campaign Phase 2)
burn = { version = "0.20", default-features = false, features = ["ndarray", "autodiff", "std"] }
burn-ndarray = { version = "0.20", features = ["std"] }
bytes = "1.6.1"
# candle-core = "0.9"
# candle-nn = "0.9"
# candle-transformers = "0.9"
chrono = { version = "0.4.38", features = ["serde"] }
clap = { version = "4.5.11", features = ["derive", "cargo", "env"] }
# dirs — REPLACED by nexcore-fs::dirs (sovereignty campaign)
flate2 = "1.0.30"
futures = "0.3.30"
# glob — REPLACED by nexcore-fs::glob (sovereignty campaign)
# hex — REPLACED by nexcore-codec (sovereignty campaign Phase 2)
http-body-util = "0.1.2"
jsonwebtoken = "9"
molt = "0.3"
# once_cell — REMOVED: migrated to std::sync::LazyLock (Rust 1.80+)
phf = { version = "0.11.2", features = ["macros"] }
proc-macro2 = "1.0.86"
proptest = "1.6.0"
quote = "1.0.36"
rand = "0.9.0"
rayon = "1.10"
regex = "1.10.5"
reqwest = { version = "0.12.5", default-features = false, features = ["json", "rustls-tls"] }
rusqlite = { version = "0.32", features = ["bundled", "serde_json"] }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = "1.0.120"
serde_yml = "0.0.12"
sha2 = "0.10.8"
hmac = "0.12.1"
# slint = "1.9"
# slint-build = "1.9"
syn = { version = "2.0.71", features = ["full"] }
tar = "0.4.41"
tempfile = "3.10.1"
# thiserror = "1.0.61"  # REPLACED by nexcore-error + nexcore-error-derive
tokio = { version = "1.38.0", features = ["full"] }
toml = "0.8.15"
tower = { version = "0.4.13", features = ["full"] }
tower-http = { version = "0.5.2", features = ["cors", "trace", "compression-full"] }
tracing = "0.1.40"
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }
urlencoding = "2.1.3"
utoipa = { version = "5.3", features = ["axum_extras", "chrono"] }
# REPLACED by nexcore-id (sovereignty campaign Phase 1B)
# uuid = { version = "1.10.0", features = ["v4", "serde"] }
# walkdir — REPLACED by nexcore-fs::walk (sovereignty campaign)

