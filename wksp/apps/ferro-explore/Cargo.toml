[package]
name = "ferro-explore"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
leptos = { workspace = true }
leptos_router = { workspace = true }
leptos_meta = { workspace = true }
leptos_axum = { workspace = true , optional = true }

axum = { workspace = true , optional = true }
tokio = { workspace = true , optional = true }
tower = { workspace = true , optional = true }
tower-http = { workspace = true , optional = true }

serde = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

# Hydration support
wasm-bindgen = { workspace = true , optional = true }

[features]
default = []
ssr = [
    "leptos/ssr",
    "leptos_router/ssr",
    "leptos_meta/ssr",
    "dep:leptos_axum",
    "dep:axum",
    "dep:tokio",
    "dep:tower",
    "dep:tower-http",
]
hydrate = [
    "leptos/hydrate",
    "dep:wasm-bindgen",
]

# Leptos settings for cargo-leptos
[package.metadata.leptos]
# Name of the binary target used for the server
bin-target = "ferro-explore"
# Site root (where static files are served from)
site-root = "target/site"
# Site package directory (where WASM is output)
site-pkg-dir = "pkg"
# Site address
site-addr = "127.0.0.1:3000"
# Reload port for hot-reload
reload-port = 3001
# Browser open on start
browser-open = false
