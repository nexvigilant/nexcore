
[package]
name = "disney-loop"
version = "1.0.0"
edition = "2024"
rust-version = "1.85"
authors = ["Matthew Campion, PharmD <team@nexvigilant.com>"]
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository.workspace = true
homepage.workspace = true
readme = "README.md"
description = "Forward-only compound discovery loop. Assess state, reject regression, search for novelty, arrive at new state. Based on T1 primitive decomposition of Walt Disney's curiosity doctrine."

keywords = ["nexcore", "foundation", "primitives"]
categories = ["development-tools"]
[dependencies]
tokio = { workspace = true }
nexcore-error = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
clap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
nexcore-dataframe = { path = "../nexcore-dataframe", version = "0.1.0" }

[dev-dependencies]
tempfile = { workspace = true }

[[bin]]
name = "disney-loop"
path = "src/main.rs"

[lints]
workspace = true
