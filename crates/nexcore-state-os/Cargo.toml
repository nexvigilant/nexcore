
[package]
name = "nexcore-state-os"
version = "0.1.0"
edition = "2024"
license = "LicenseRef-NexVigilant-Proprietary"
rust-version = "1.85"
description = "State Operating System — 15-layer runtime for state machine orchestration"
authors = ["Matthew Campion, PharmD <matthew@nexvigilant.com>"]
license-file = "LICENSE"
repository = "https://github.com/nexvigilant/nexcore"
keywords = ["state-machine", "operating-system", "orchestration", "runtime"]
categories = ["data-structures", "asynchronous"]

[dependencies]
nexcore-state-theory = { version = "0.1.0", path = "../nexcore-state-theory", registry = "nexcore" }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore", optional = true }
serde = { version = "1.0.204", features = ["derive"] }

[dev-dependencies]
proptest = { version = "1.6.0" }

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = "warn"
pedantic = "warn"
nursery = "warn"
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
module_name_repetitions = "allow"
doc_markdown = "allow"
missing_const_for_fn = "allow"
cast_possible_truncation = "allow"
option_if_let_else = "allow"
significant_drop_tightening = "allow"

[features]
default = ["std"]
std = []
async = []
grounding = ["dep:nexcore-lex-primitiva"]
