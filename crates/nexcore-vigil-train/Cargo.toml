[package]
name = "nexcore-vigil-train"
description = "Full-Rust sovereign LoRA training pipeline for Vigil: SFT + DPO + merge + serve using Candle. Replaces Python/transformers/peft/trl stack end-to-end."
version = "0.1.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository.workspace = true
homepage.workspace = true
rust-version = "1.85"

keywords = ["nexcore", "llm", "lora", "dpo", "candle"]
categories = ["science", "machine-learning"]

[dependencies]
# Candle — the Rust ML framework
candle-core = { workspace = true }
candle-nn = { workspace = true }
candle-transformers = { workspace = true }

# Tokenizer (HuggingFace Rust crate)
tokenizers = { version = "0.20", default-features = false, features = ["onig"] }

# Workspace internals
nexcore-error = { workspace = true, features = ["std"] }

# Serialization / CLI
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
clap = { workspace = true }

# Observability
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# HTTP server (Phase 1 Cloud Run target)
axum = { workspace = true }
tokio = { workspace = true }
tokio-stream = "0.1"
tower-http = { workspace = true }

[[bin]]
name = "nexcore-vigil-train"
path = "src/main.rs"

[lints]
workspace = true
