
[package]
name = "nexcore-hormones"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
description = "Endocrine system for .claude - persistent state modulators affecting behavior across sessions"

[dependencies]
chrono = { version = "0.4.38", features = ["serde"] }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }

[dev-dependencies]
tempfile = { version = "3.10.1" }

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = "warn"
pedantic = "warn"
nursery = "warn"
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
module_name_repetitions = "allow"
doc_markdown = "allow"
missing_const_for_fn = "allow"
cast_possible_truncation = "allow"
option_if_let_else = "allow"
significant_drop_tightening = "allow"

[[bin]]
name = "sessionstart_endocrine_loader"
path = "src/bin/sessionstart_endocrine_loader.rs"
