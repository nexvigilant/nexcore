
[package]
name = "prima-pipeline"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository.workspace = true
homepage.workspace = true
authors = ["NexVigilant Team <team@nexvigilant.com>"]
description = "Universal Concept Translator: Prima source -> T1 primitives -> Execution"

keywords = ["nexcore", "compiler", "language"]
categories = ["compilers"]
[[bin]]
name = "prima-translate"
path = "src/main.rs"

[dependencies]
prima = { version = "0.1.0", path = "../prima" }
lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", package = "nexcore-lex-primitiva" }
tokio = { version = "1.38.0", features = ["full"] }
nexcore-error = { workspace = true }
tracing = { version = "0.1.40" }
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }
clap = { version = "4.5.11", features = ["derive", "cargo", "env"] }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }

[dev-dependencies]
tempfile = { version = "3.10.1" }


[lints]
workspace = true
