
[package]
name = "nexcore-shell"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "NexCore Shell — device launcher and home screen for watch, phone, and desktop"
authors = ["Matthew Campion, PharmD <matthew@nexvigilant.com>"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/nexvigilant/nexcore"
homepage.workspace = true
keywords = ["shell", "launcher", "home-screen", "ui"]
categories = ["gui"]

[dependencies]
nexcore-pal = { workspace = true }
nexcore-os = { workspace = true }
nexcore-compositor = { workspace = true }
nexcore-lex-primitiva = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
nexcore-pal-linux = { workspace = true }

[lints]
workspace = true
