
[package]
name = "nexcore-organize"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
description = "ORGANIZE algorithm — 8-step file organization pipeline grounded to T1 primitives (∃ κ μ → ∂ Σ ∅ ς)"

[[bin]]
name = "nexcore-organize"
path = "src/bin/main.rs"

[dependencies]
nexcore-error = { workspace = true }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
chrono = { version = "0.4.38", features = ["serde"] }
nexcore-fs = { workspace = true }
toml = { version = "0.8.15" }
sha2 = { version = "0.10.8" }
nexcore-codec = { version = "0.1.0", path = "../nexcore-codec", registry = "nexcore" }
clap = { version = "4.5.11", features = ["derive", "cargo", "env"] }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore" }

[dev-dependencies]
tempfile = { version = "3.10.1" }

[lints.rust]
async_fn_in_trait = "allow"
dead_code = "allow"
unused_imports = "allow"
unused_variables = "allow"
unused_mut = "allow"
unused_assignments = "allow"
unused_must_use = "allow"

[lints.clippy]
all = "allow"
pedantic = "allow"
nursery = "allow"
cargo = "allow"
map_unwrap_or = "allow"
manual_map = "allow"
option_map_or_none = "allow"
derivable_impls = "allow"
unwrap_used = "allow"
expect_used = "allow"
panic = "allow"
todo = "allow"
unimplemented = "allow"
unreachable = "allow"
