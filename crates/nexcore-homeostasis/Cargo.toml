[package]
name = "nexcore-homeostasis"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Self-regulating system framework inspired by biological homeostasis"

keywords = ["nexcore", "biology", "medical"]
categories = ["science"]
[dependencies]
nexcore-flywheel = { path = "../nexcore-flywheel", version = "0.1.0" }
nexcore-primitives = { path = "../nexcore-primitives", version = "1.0.0" }
nexcore-homeostasis-primitives = { path = "../nexcore-homeostasis-primitives", version = "1.0.0" }
nexcore-homeostasis-storm = { path = "../nexcore-homeostasis-storm", version = "1.0.0" }
nexcore-homeostasis-memory = { path = "../nexcore-homeostasis-memory", version = "1.0.0" }
nexcore-homeostasis-sensing = { path = "../nexcore-homeostasis-sensing", version = "1.0.0" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
nexcore-error = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true, features = ["sync", "time", "rt", "macros"] }

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }

[lints]
workspace = true
