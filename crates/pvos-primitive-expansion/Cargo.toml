
[package]
name = "pvos-primitive-expansion"
version = "1.0.0"
edition = "2024"
rust-version = "1.85"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
description = "Research-synthesized PVOS expansion: 17 primitive-grounded types across location, frequency, bridges, gaps, and exploratory modules"

[dependencies]
tokio = { version = "1.38.0", features = ["full"] }
nexcore-error = { workspace = true }
tracing = { version = "0.1.40" }
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }
clap = { version = "4.5.11", features = ["derive", "cargo", "env"] }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
polars = { version = "0.44", features = ["lazy", "csv", "json"] }
reqwest = { version = "0.12.5", features = ["json"] }
url = { version = "2.5.2" }
csv = { version = "1.3.0" }

[dev-dependencies]
proptest = { version = "1.6.0" }
tempfile = { version = "3.10.1" }

[lints.rust]
async_fn_in_trait = "allow"
dead_code = "allow"
unused_imports = "allow"
unused_variables = "allow"
unused_mut = "allow"
unused_assignments = "allow"
unused_must_use = "allow"

[lints.clippy]
all = "allow"
pedantic = "allow"
nursery = "allow"
cargo = "allow"
map_unwrap_or = "allow"
manual_map = "allow"
option_map_or_none = "allow"
derivable_impls = "allow"
unwrap_used = "allow"
expect_used = "allow"
panic = "allow"
todo = "allow"
unimplemented = "allow"
unreachable = "allow"
