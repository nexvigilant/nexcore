[package]
name = "nexvigilant-terminal"
version = "0.2.0"
edition = "2024"
authors = ["Matthew Campion, PharmD <matthew@camp-corp.com>"]
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository = "https://github.com/nexvigilant/nexcore"
homepage.workspace = true
rust-version = "1.85"
description = "NexVigilant Terminal — Tauri desktop app for agent observability and cloud shell"

keywords = ["nexcore", "pharmacovigilance", "drug-safety"]
categories = ["science"]
[[bin]]
name = "nexvigilant-terminal"
path = "src/main.rs"

[[bin]]
name = "nvterm-mcp"
path = "src/bin/nvterm_mcp.rs"

[lib]
path = "src/lib.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
# Phase 2: live backends wired
nexcore-terminal = { path = "../nexcore-terminal", version = "0.1.0" }
nexcore-shell = { path = "../nexcore-shell", version = "0.1.0" }
nexcore-pal = { path = "../nexcore-pal", version = "0.1.0" }
nexcloud = { path = "../nexcloud", version = "1.0.0" }
nexcore-chrono = { workspace = true }
vr-core = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
reqwest = { workspace = true }
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"

[lints]
workspace = true
