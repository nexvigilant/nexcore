
[package]
name = "disney-loop"
version = "1.0.0"
edition = "2024"
rust-version = "1.85"
authors = ["Matthew Campion, PharmD <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
description = "Forward-only compound discovery loop. Assess state, reject regression, search for novelty, arrive at new state. Based on T1 primitive decomposition of Walt Disney's curiosity doctrine."

[dependencies]
tokio = { version = "1.38.0", features = ["full"] }
nexcore-error = { workspace = true }
thiserror = { version = "1.0.61" }
tracing = { version = "0.1.40" }
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }
clap = { version = "4.5.11", features = ["derive", "cargo", "env"] }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
polars = { version = "0.44", features = ["lazy", "csv", "json"] }
antitransformer = { version = "1.0.0", path = "../antitransformer", registry = "nexcore" }
nexcore-transform = { version = "1.0.0", path = "../nexcore-transform", registry = "nexcore" }

[dev-dependencies]
tempfile = { version = "3.10.1" }

[lints.rust]
async_fn_in_trait = "allow"
dead_code = "allow"
unused_imports = "allow"
unused_variables = "allow"
unused_mut = "allow"
unused_assignments = "allow"
unused_must_use = "allow"

[lints.clippy]
all = "allow"
pedantic = "allow"
nursery = "allow"
cargo = "allow"
map_unwrap_or = "allow"
manual_map = "allow"
option_map_or_none = "allow"
derivable_impls = "allow"
unwrap_used = "allow"
expect_used = "allow"
panic = "allow"
todo = "allow"
unimplemented = "allow"
unreachable = "allow"

[[bin]]
name = "disney-loop"
path = "src/main.rs"
