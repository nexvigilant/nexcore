
[package]
name = "nexcore-faers-etl"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "MIT OR Apache-2.0"
repository.workspace = true
homepage.workspace = true
readme = "README.md"
rust-version = "1.85"
description = "Stream FAERS quarterly ASCII files and generate drug-event contingency tables for signal detection"

keywords = ["nexcore", "pharmacovigilance", "drug-safety"]
categories = ["science"]
[[bin]]
name = "nexcore-faers-etl"
path = "src/main.rs"

[lib]
name = "nexcore_faers_etl"
path = "src/lib.rs"

[dependencies]
# Workspace crates (signals consolidated into vigilance::pv::signals)
nexcore-edit-distance = { version = "1.0.0", path = "../nexcore-edit-distance" }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }
nexcore-vigilance = { version = "1.0.0", path = "../nexcore-vigilance" }

stem-math = { version = "0.1.0", path = "../stem-math" }

# Workspace dependencies
tokio = { version = "1.38.0", features = ["full"] }
nexcore-error = { workspace = true }
tracing = { version = "0.1.40" }
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }
clap = { version = "4.5.11", features = ["derive", "cargo", "env"] }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
nexcore-dataframe = { path = "../nexcore-dataframe", version = "0.1.0" }
rayon = { version = "1.10.0" }
nexcore-chrono = { workspace = true }

# HTTP client for OpenFDA API
reqwest = { version = "0.12", features = ["json"] }

# DuckDB for local FAERS storage (feature-gated: adds ~5min compile time from C++ bundled build)
duckdb = { version = "1.1", features = ["bundled"], optional = true }

[features]
default = []
duckdb-store = ["duckdb"]

[dev-dependencies]
proptest = { version = "1.6.0" }
tempfile = { version = "3.10.1" }
duckdb = { version = "1.1", features = ["bundled"] }

[lints]
workspace = true
