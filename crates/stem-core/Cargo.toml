
[package]
name = "stem-core"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "STEM primitives: Science, Technology, Engineering, Mathematics as Rust traits"
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository = "https://github.com/nexvigilant/stem"
homepage.workspace = true
keywords = ["primitives", "science", "cross-domain", "traits"]
categories = ["science", "development-tools"]
publish = true

[dependencies]
nexcore-error = { workspace = true }
nexcore-constants = { version = "1.0.0", path = "../nexcore-constants" }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }
serde = { version = "1.0.204", features = ["derive"] }
tracing = { version = "0.1.40" }

[dev-dependencies]
tokio = { version = "1.38.0", features = ["full"] }
serde_json = { version = "1.0.120" }

[lints]
workspace = true
