[package]
name = "nexcore-knowledge-engine"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
description = "Knowledge compression, compilation, and query engine for structured knowledge packs"

[dependencies]
nexcore-error = { workspace = true }
nexcore-lex-primitiva = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
nexcore-id = { workspace = true }
nexcore-fs = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[lints]
workspace = true
