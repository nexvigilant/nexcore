
[package]
name = "nexcore-skills-engine"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/nexvigilant/nexcore"
homepage.workspace = true
rust-version = "1.85"
description = "Skill registry, routing, validation, taxonomy, and code generation engine"

keywords = ["nexcore", "knowledge-management", "automation"]
categories = ["development-tools"]
[dependencies]
nexcore-error = { workspace = true }
nexcore-constants = { version = "1.0.0", path = "../nexcore-constants" }
nexcore-edit-distance = { version = "1.0.0", path = "../nexcore-edit-distance" }
nexcore-dtree = { version = "1.0.0", path = "../nexcore-dtree" }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }
nexcore-measure = { version = "1.0.0", path = "../nexcore-measure" }
nexcore-primitives = { workspace = true }
nexcore-flywheel = { path = "../nexcore-flywheel", version = "0.1.0" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
serde_yml = { version = "0.0.12" }
nexcore-chrono = { workspace = true }
nexcore-fs = { workspace = true }
regex = { version = "1.10.5" }
phf = { version = "0.11.2", features = ["macros"] }


[dev-dependencies]
tempfile = { version = "3.10.1" }


[lints]
workspace = true
