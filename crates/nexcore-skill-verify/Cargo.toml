
[package]
name = "nexcore-skill-verify"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Skill verification infrastructure for Claude Code skills"
license = "MIT"

[dependencies]
nexcore-error = { workspace = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yml = "0.0.12"
clap = { version = "4.0", features = ["derive"] }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore" }

[dev-dependencies]
tempfile = "3.15"

[[bin]]
name = "skill-verify"
path = "bin/skill-verify.rs"


[lints]
workspace = true
