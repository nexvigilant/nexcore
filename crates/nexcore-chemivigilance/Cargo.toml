[package]
name = "nexcore-chemivigilance"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
repository.workspace = true
authors = ["NexVigilant Team <team@nexvigilant.com>"]
description = "Chemivigilance pipeline orchestrator generating SafetyBrief with min-3 limitations"

[dependencies]
nexcore-error = { workspace = true }
nexcore-molcore = { path = "../nexcore-molcore", version = "0.1.0" }
nexcore-structural-alerts = { path = "../nexcore-structural-alerts", version = "0.1.0" }
nexcore-qsar = { path = "../nexcore-qsar", version = "0.1.0" }
nexcore-metabolite = { path = "../nexcore-metabolite", version = "0.1.0" }
nexcore-chrono = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }


[lints]
workspace = true
