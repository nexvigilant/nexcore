[package]
name = "pv-signal-detector"
version = "0.1.0"
edition = "2024"
description = "Pharmacovigilance signal detection pipeline"
authors = ["NexVigilant"]
license = "LicenseRef-NexVigilant-Proprietary-1.0"

[dependencies]
tokio = { version = "1.47", features = ["full"] }
anyhow = "1.0"
thiserror = "2.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
clap = { version = "4.5", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
polars = { version = "0.46", features = ["lazy", "json", "parquet"] }
reqwest = { version = "0.12", features = ["json"] }
url = "2.5"
csv = "1.3"
base64 = "0.22"

[dev-dependencies]
proptest = "1.5"
tempfile = "3.14"

[profile.release]
lto = true
strip = true
codegen-units = 1
