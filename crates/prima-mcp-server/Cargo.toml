
[package]
name = "prima-mcp-server"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
repository.workspace = true
authors = ["NexVigilant Team <team@nexvigilant.com>"]
description = "MCP server that executes Prima functions as tools"

[[bin]]
name = "prima-mcp-server"
path = "src/main.rs"

[dependencies]
nexcore-error = { workspace = true }
prima = { version = "0.1.0", path = "../prima" }
prima-mcp = { version = "0.1.0", path = "../prima-mcp" }
prima-codegen = { version = "0.1.0", path = "../prima-codegen" }
lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", package = "nexcore-lex-primitiva" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
tokio = { version = "1.38.0", features = ["full"] }

[dev-dependencies]
proptest = { version = "1.6.0" }


[lints]
workspace = true
