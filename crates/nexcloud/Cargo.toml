
[package]
name = "nexcloud"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/nexvigilant/nexcore"
rust-version = "1.85"
description = "Rust-native cloud platform: 35-type taxonomy + process supervisor + reverse proxy"

[[bin]]
name = "nexcloud"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

[dependencies]
nexcore-error = { workspace = true }
tokio = { workspace = true }
hyper = { version = "1.5", features = ["http1", "http2", "server"] }
hyper-util = { version = "0.1", features = ["tokio"] }
http-body-util = { workspace = true }
rustls = "0.23"
tokio-rustls = "0.26"
rustls-pki-types = "1.10"
rustls-pemfile = "2.2"
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
clap = { workspace = true }
dashmap = "6.0.1"
nexcore-chrono = { workspace = true }
bytes = { workspace = true }
http = "1.2"
nix = { version = "0.29", features = ["signal", "process", "fs", "mount", "reboot", "hostname"] }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }

[dev-dependencies]
tempfile = { workspace = true }


[lints]
workspace = true
