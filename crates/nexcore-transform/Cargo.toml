
[package]
name = "nexcore-transform"
version = "1.0.0"
edition = "2024"
rust-version = "1.85"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository.workspace = true
homepage.workspace = true
description = "Deterministic text transformation engine: segment, annotate, map concepts across domains, compile transformation plans"

keywords = ["nexcore", "pharmacovigilance"]
categories = ["development-tools"]
[dependencies]
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }
nexcore-domain-primitives = { version = "0.1.0", path = "../nexcore-domain-primitives" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
regex = { version = "1.10.5" }


[lints]
workspace = true
