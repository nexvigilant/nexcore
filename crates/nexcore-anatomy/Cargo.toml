
[package]
name = "nexcore-anatomy"
version = "1.0.0"
edition = "2024"
rust-version = "1.85"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository.workspace = true
homepage.workspace = true
readme = "README.md"
description = "Structural anatomy analysis for Rust workspaces — dependency graph metrics, layer validation, Chomsky classification, and criticality scoring"

keywords = ["nexcore", "mathematics", "science"]
categories = ["science", "algorithms"]
[dependencies]
nexcore-error = { workspace = true }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
cargo_metadata = "0.19"

[[bin]]
name = "anatomy-check"
path = "src/bin/anatomy_check.rs"

[dev-dependencies]

[lints]
workspace = true
