[workspace]

[package]
name = "nexcore-bridge-mcp"
version = "1.0.0"
edition = "2024"
description = "MCP bridge connector for NexVigilant Core REST API"

[[bin]]
name = "nexcore-bridge-mcp"
path = "src/main.rs"

[dependencies]
# MCP server framework
rmcp = { version = "0.14", features = ["server", "transport-io"] }

# Async runtime
tokio = { version = "1.40", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
anyhow = "1.0"
thiserror = "2.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# HTTP client for connecting to nexcore-api
reqwest = { version = "0.12", features = ["json", "rustls-tls"] }

# Environment and CLI
clap = { version = "4.5", features = ["derive", "env"] }
url = "2.5"

[lints.rust]
async_fn_in_trait = "allow"
dead_code = "allow"
unused_imports = "allow"
unused_variables = "allow"
unused_mut = "allow"
unused_assignments = "allow"
unused_must_use = "allow"

[lints.clippy]
all = "allow"
pedantic = "allow"
nursery = "allow"
cargo = "allow"
map_unwrap_or = "allow"
manual_map = "allow"
option_map_or_none = "allow"
derivable_impls = "allow"
unwrap_used = "allow"
expect_used = "allow"
panic = "allow"
todo = "allow"
unimplemented = "allow"
unreachable = "allow"
