[package]
name = "vr-platform-ml"
description = "PRPaaS platform ML engine — anonymized aggregation, multi-model serving, benchmarking, active learning"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "MIT OR Apache-2.0"
repository.workspace = true
homepage.workspace = true
readme = "README.md"
rust-version = "1.85"

keywords = ["nexcore", "platform", "pharmacovigilance"]
categories = ["development-tools"]
[dependencies]
vr-core = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
nexcore-id = { workspace = true }
nexcore-chrono = { workspace = true }

[lints]
workspace = true
