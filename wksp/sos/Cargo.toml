[package]
name = "sos"
version = "0.1.0"
edition = "2024"
description = "SOS - The Vigilance Machine (Mobile)"
license = "LicenseRef-NexVigilant-Proprietary-1.0"

[dependencies]
leptos = { version = "0.8", features = ["csr"] }
leptos_router = "0.8"
leptos_meta = "0.8"
futures = "0.3"
gloo-net = { version = "0.6", features = ["http", "websocket", "json"] }
gloo-storage = "0.3"
gloo-timers = { version = "0.3", features = ["futures"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = [
    "console",
    "Window",
    "Document",
    "HtmlInputElement",
] }
js-sys = "0.3"
log = "0.4"
console_log = "1"
console_error_panic_hook = "0.1"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true

[lints.rust]
dead_code = "allow"
unused_imports = "allow"
