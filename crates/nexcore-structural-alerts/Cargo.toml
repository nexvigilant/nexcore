[package]
name = "nexcore-structural-alerts"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository.workspace = true
homepage.workspace = true
authors = ["NexVigilant Team <team@nexvigilant.com>"]
description = "ICH M7 structural alert library with substructure matching"

keywords = ["nexcore", "pharmacovigilance"]
