
[package]
name = "skills-mcp"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "MIT OR Apache-2.0"
repository.workspace = true
description = "MCP server exposing vocabulary programs (LEARN, PROVE, VITALS, etc.) as callable tools"

[[bin]]
name = "skills-mcp"
path = "src/main.rs"

[dependencies]
nexcore-error = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
tokio = { workspace = true, features = ["full"] }
nexcore-chrono = { workspace = true }
rmcp = { version = "0.14", features = ["server", "transport-io"] }
schemars = "1.2"
rusqlite = { workspace = true }

[lints]
workspace = true
