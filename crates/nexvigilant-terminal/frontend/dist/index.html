<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexVigilant Terminal</title>
  <style>
    :root {
      --bg-primary: #0a0e14;
      --bg-bar: #111822;
      --border: #2a3a4e;
      --text: #e0e8f0;
      --text-dim: #8899aa;
      --text-muted: #556677;
      --emerald: #34d399;
      --blue: #60a5fa;
      --red: #f87171;
      --font: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Noto Sans Mono', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: var(--bg-primary);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
    }
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    /* Title bar */
    .title-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 32px;
      padding: 0 12px;
      background: var(--bg-bar);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-dim);
      -webkit-app-region: drag;
      flex-shrink: 0;
      user-select: none;
    }
    .title-bar .left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .title-bar .brand {
      color: var(--emerald);
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .title-bar .right {
      display: flex;
      align-items: center;
      gap: 12px;
      -webkit-app-region: no-drag;
    }
    /* Status dot */
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-dot.connected {
      background: var(--emerald);
      box-shadow: 0 0 6px var(--emerald);
    }
    .status-dot.disconnected {
      background: var(--red);
      box-shadow: 0 0 6px var(--red);
    }
    /* Tab bar */
    .tab-bar {
      display: flex;
      align-items: center;
      height: 28px;
      padding: 0 4px;
      background: var(--bg-bar);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 2px;
      overflow-x: auto;
    }
    .tab-bar::-webkit-scrollbar { height: 0; }
    .tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 10px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 4px 4px 0 0;
      border: 1px solid transparent;
      border-bottom: none;
      white-space: nowrap;
      user-select: none;
      -webkit-app-region: no-drag;
    }
    .tab:hover { color: var(--text-dim); background: #ffffff08; }
    .tab.active {
      color: var(--text);
      background: var(--bg-primary);
      border-color: var(--border);
    }
    .tab .close-btn {
      font-size: 13px;
      line-height: 1;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0 2px;
    }
    .tab .close-btn:hover { color: var(--red); }
    .tab-add {
      padding: 2px 8px;
      font-size: 14px;
      color: var(--text-muted);
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    .tab-add:hover { color: var(--emerald); }
    /* Terminal fills everything */
    #terminal-container {
      flex: 1;
      padding: 4px;
      overflow: hidden;
      position: relative;
    }
    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 24px;
      padding: 0 12px;
      background: var(--bg-bar);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .status-bar .left, .status-bar .right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    /* Fallback input bar */
    .input-bar {
      display: flex;
      align-items: center;
      height: 32px;
      padding: 0 8px;
      background: #0d1117;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      gap: 6px;
    }
    .input-prompt {
      color: var(--emerald);
      font-size: 13px;
      font-weight: 600;
    }
    .input-field {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      outline: none;
      caret-color: var(--emerald);
    }
    .input-field::placeholder { color: var(--text-muted); }
    /* xterm.js overrides */
    .xterm { height: 100%; }
    .xterm-viewport { overflow-y: auto !important; }
    .xterm-viewport::-webkit-scrollbar { width: 8px; }
    .xterm-viewport::-webkit-scrollbar-track { background: var(--bg-primary); }
    .xterm-viewport::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
    .xterm-viewport::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }
    /* Tab terminal containers */
    .tab-terminal-container {
      position: absolute;
      inset: 0;
    }
    .tab-terminal-container .xterm { height: 100%; }
    /* Toast notifications */
    .toast-container {
      position: fixed;
      top: 40px;
      right: 12px;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: none;
      max-width: 360px;
    }
    .toast {
      pointer-events: auto;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-family: var(--font);
      background: #111822;
      border: 1px solid var(--border);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      animation: toast-in 200ms ease-out;
      cursor: pointer;
      max-width: 360px;
    }
    .toast.dismissing { animation: toast-out 200ms ease-in forwards; }
    .toast-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
    .toast-body { flex: 1; }
    .toast-title { font-weight: 600; margin-bottom: 2px; }
    .toast-message { color: var(--text-dim); font-size: 10px; }
    .toast-time { color: var(--text-muted); font-size: 9px; margin-top: 2px; }
    .toast.info    { border-left: 3px solid var(--blue); }
    .toast.success { border-left: 3px solid var(--emerald); }
    .toast.warning { border-left: 3px solid #fbbf24; }
    .toast.critical { border-left: 3px solid var(--red); }
    .toast.info .toast-icon    { color: var(--blue); }
    .toast.success .toast-icon { color: var(--emerald); }
    .toast.warning .toast-icon { color: #fbbf24; }
    .toast.critical .toast-icon { color: var(--red); }
    @keyframes toast-in {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes toast-out {
      from { opacity: 1; transform: translateX(0); }
      to { opacity: 0; transform: translateX(40px); }
    }
    /* Mode pill */
    .mode-pill {
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: background 200ms, color 200ms;
    }
    .mode-pill[data-mode="Normal"]  { color: var(--text-dim); background: transparent; border: 1px solid var(--border); }
    .mode-pill[data-mode="Focus"]   { color: #fbbf24; background: #fbbf2418; border: 1px solid #fbbf2440; }
    .mode-pill[data-mode="Agent"]   { color: var(--emerald); background: #34d39918; border: 1px solid #34d39940; }
    .mode-pill[data-mode="Pairing"] { color: #c084fc; background: #c084fc18; border: 1px solid #c084fc40; }
  </style>
  <link rel="stylesheet" href="xterm.css" />
</head>
<body>
  <div class="app">
    <div class="title-bar">
      <div class="left">
        <span class="brand">NexVigilant Terminal</span>
        <span class="status-dot disconnected" id="connection-status" title="Disconnected"></span>
      </div>
      <div class="right">
        <span id="session-info">No session</span>
        <span id="terminal-size">--x--</span>
      </div>
    </div>
    <div class="tab-bar" id="tab-bar">
      <div class="tab-add" id="tab-add" title="New Session (Ctrl+Shift+N)">+</div>
    </div>
    <div id="terminal-container" tabindex="0"></div>
    <!-- Fallback input bar: WebKitGTK/Wayland keyboard workaround -->
    <div class="input-bar" id="input-bar">
      <span class="input-prompt">$</span>
      <input type="text" id="input-field" class="input-field"
             placeholder="Type here if keyboard doesn't work in terminal..." autocomplete="off" spellcheck="false" />
    </div>
    <div class="status-bar">
      <div class="left">
        <span>NexVigilant Terminal v0.3.0</span>
      </div>
      <div class="right">
        <span>UTF-8</span>
        <span>bash</span>
      </div>
    </div>
  </div>
  <div class="toast-container" id="toast-container"></div>
  <script src="app.js"></script>
</body>
</html>
