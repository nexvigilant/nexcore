[package]
name = "nexcore-retrocasting"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "LicenseRef-Proprietary"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
description = "Retrocasting engine: links FAERS safety signals to molecular structures for pre-market safety prediction"

[dependencies]
nexcore-error = { workspace = true }
nexcore-compound-registry = { path = "../nexcore-compound-registry" }
reqwest = { version = "0.12.5", features = ["json"] }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
tokio = { version = "1.38.0", features = ["full"] }
nexcore-chrono = { workspace = true }
tracing = { version = "0.1.40" }

[dev-dependencies]
tokio = { version = "1.38.0", features = ["full"] }

[features]
# Enable Tanimoto-based structural clustering using Morgan fingerprints.
# Requires nexcore-molcore with the fingerprint module (Task 7).
fingerprints = []


[lints]
workspace = true
