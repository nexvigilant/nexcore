
[package]
name = "dag-publish"
version = "0.1.0"
edition = "2024"
license = "LicenseRef-NexVigilant-Proprietary"
rust-version = "1.85"
description = "Topological DAG publisher for nexcore crates — scans Cargo.toml files, builds dependency graph, and publishes in correct order"

[dependencies]
toml = "0.8"
clap = { version = "4.5", features = ["derive"] }
nexcore-error = { workspace = true }
serde = { version = "1.0", features = ["derive"] }

[dev-dependencies]
tempfile = "3.10"
