[package]
name = "nexcore-station"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
description = "NexVigilant Station — PV tool resolution gate with confidence-scored config discovery"
license.workspace = true
repository.workspace = true
homepage.workspace = true

keywords = ["nexcore", "pharmacovigilance", "drug-safety"]
categories = ["science"]
[features]
default = []
live-feed = ["dep:reqwest"]
integration = []

[dependencies]
nexcore-constants = { workspace = true }
