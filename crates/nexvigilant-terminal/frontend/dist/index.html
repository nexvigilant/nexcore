<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexVigilant Terminal</title>
  <style>
    :root {
      --bg-primary: #0a0e14;
      --bg-bar: #111822;
      --border: #2a3a4e;
      --text: #e0e8f0;
      --text-dim: #8899aa;
      --text-muted: #556677;
      --emerald: #34d399;
      --blue: #60a5fa;
      --red: #f87171;
      --font: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Noto Sans Mono', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: var(--bg-primary);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
    }
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    /* Title bar */
    .title-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 32px;
      padding: 0 12px;
      background: var(--bg-bar);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-dim);
      -webkit-app-region: drag;
      flex-shrink: 0;
      user-select: none;
    }
    .title-bar .left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .title-bar .brand {
      color: var(--emerald);
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .title-bar .right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    /* Status dot */
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-dot.connected {
      background: var(--emerald);
      box-shadow: 0 0 6px var(--emerald);
    }
    .status-dot.disconnected {
      background: var(--red);
      box-shadow: 0 0 6px var(--red);
    }
    /* Terminal fills everything */
    #terminal-container {
      flex: 1;
      padding: 4px;
      overflow: hidden;
    }
    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 24px;
      padding: 0 12px;
      background: var(--bg-bar);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .status-bar .left, .status-bar .right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    /* Fallback input bar */
    .input-bar {
      display: flex;
      align-items: center;
      height: 32px;
      padding: 0 8px;
      background: #0d1117;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      gap: 6px;
    }
    .input-prompt {
      color: var(--emerald);
      font-size: 13px;
      font-weight: 600;
    }
    .input-field {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      outline: none;
      caret-color: var(--emerald);
    }
    .input-field::placeholder { color: var(--text-muted); }
    /* xterm.js overrides */
    .xterm { height: 100%; }
    .xterm-viewport { overflow-y: auto !important; }
    .xterm-viewport::-webkit-scrollbar { width: 8px; }
    .xterm-viewport::-webkit-scrollbar-track { background: var(--bg-primary); }
    .xterm-viewport::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
    .xterm-viewport::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }
    /* Mode pill in status bar */
    .mode-pill {
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: background 200ms, color 200ms;
    }
    .mode-pill[data-mode="Normal"]  { color: var(--text-dim); background: transparent; border: 1px solid var(--border); }
    .mode-pill[data-mode="Focus"]   { color: #fbbf24; background: #fbbf2418; border: 1px solid #fbbf2440; }
    .mode-pill[data-mode="Agent"]   { color: var(--emerald); background: #34d39918; border: 1px solid #34d39940; }
    .mode-pill[data-mode="Pairing"] { color: #c084fc; background: #c084fc18; border: 1px solid #c084fc40; }
    /* Overlay backdrop */
    .overlay-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 80px;
    }
    .overlay-backdrop.hidden { display: none; }
    /* Command palette */
    .palette-box {
      width: 520px;
      max-height: 400px;
      background: #111822;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .palette-input {
      width: 100%;
      padding: 10px 14px;
      background: #0d1117;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
    }
    .palette-input::placeholder { color: var(--text-muted); }
    .palette-results {
      max-height: 340px;
      overflow-y: auto;
    }
    .palette-item {
      padding: 8px 14px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1a223340;
    }
    .palette-item:hover { background: #1a2a3e; }
    .palette-item .label { color: var(--text); }
    .palette-item .source { color: var(--text-muted); font-size: 10px; }
    /* App launcher */
    .app-list {
      width: 320px;
      background: #111822;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .app-list-header {
      padding: 8px 12px;
      font-size: 11px;
      color: var(--emerald);
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    .app-item {
      padding: 8px 12px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .app-item:hover { background: #1a2a3e; }
    .app-item .name { color: var(--text); }
    .app-item .state { font-size: 10px; color: var(--text-muted); }
    /* Tab bar */
    .tab-bar {
      display: flex;
      align-items: center;
      height: 28px;
      padding: 0 4px;
      background: var(--bg-bar);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 2px;
      overflow-x: auto;
    }
    .tab-bar::-webkit-scrollbar { height: 0; }
    .tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 10px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 4px 4px 0 0;
      border: 1px solid transparent;
      border-bottom: none;
      white-space: nowrap;
      user-select: none;
      -webkit-app-region: no-drag;
    }
    .tab:hover { color: var(--text-dim); background: #ffffff08; }
    .tab.active {
      color: var(--text);
      background: var(--bg-primary);
      border-color: var(--border);
    }
    .tab .close-btn {
      font-size: 13px;
      line-height: 1;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0 2px;
    }
    .tab .close-btn:hover { color: var(--red); }
    .tab-add {
      padding: 2px 8px;
      font-size: 14px;
      color: var(--text-muted);
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    .tab-add:hover { color: var(--emerald); }
    /* Main content area: terminal + side panel */
    .main-area {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    /* Side panel (cloud + agents) */
    .side-panel {
      width: 280px;
      flex-shrink: 0;
      background: var(--bg-bar);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .side-panel.hidden { display: none; }
    .side-panel-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .side-panel-section + .side-panel-section {
      border-top: 1px solid var(--border);
    }
    .side-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .side-panel-header .refresh-btn {
      cursor: pointer;
      color: var(--text-muted);
      font-size: 12px;
      -webkit-app-region: no-drag;
    }
    .side-panel-header .refresh-btn:hover { color: var(--emerald); }
    .side-panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .side-panel-body::-webkit-scrollbar { width: 4px; }
    .side-panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    /* Service row */
    .svc-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 10px;
      font-size: 11px;
    }
    .svc-row:hover { background: #ffffff06; }
    .svc-name { color: var(--text); }
    .svc-badge {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      font-weight: 600;
    }
    .svc-badge.healthy { color: var(--emerald); background: #34d39915; }
    .svc-badge.unhealthy { color: var(--red); background: #f8717115; }
    .svc-badge.unknown { color: var(--text-muted); background: #55667715; }
    /* Agent event row */
    .agent-row {
      padding: 4px 10px;
      font-size: 11px;
      border-bottom: 1px solid #1a223320;
    }
    .agent-row .agent-time { color: var(--text-muted); font-size: 9px; }
    .agent-row .agent-svc { color: var(--blue); }
    .agent-row .agent-msg { color: var(--text-dim); }
    .agent-empty {
      padding: 12px 10px;
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
    }
    /* Service indicators in status bar */
    .svc-indicator {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      color: var(--text-muted);
    }
    .svc-indicator .status-dot {
      width: 5px;
      height: 5px;
    }
    /* Tab terminal containers */
    .tab-terminal-container {
      position: absolute;
      inset: 0;
    }
    .tab-terminal-container .xterm { height: 100%; }
    /* Toast notifications */
    .toast-container {
      position: fixed;
      top: 40px;
      right: 12px;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: none;
      max-width: 360px;
    }
    .toast {
      pointer-events: auto;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-family: var(--font);
      background: #111822;
      border: 1px solid var(--border);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      animation: toast-in 200ms ease-out;
      cursor: pointer;
      max-width: 360px;
    }
    .toast.dismissing { animation: toast-out 200ms ease-in forwards; }
    .toast-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
    .toast-body { flex: 1; }
    .toast-title { font-weight: 600; margin-bottom: 2px; }
    .toast-message { color: var(--text-dim); font-size: 10px; }
    .toast-time { color: var(--text-muted); font-size: 9px; margin-top: 2px; }
    .toast.info    { border-left: 3px solid var(--blue); }
    .toast.success { border-left: 3px solid var(--emerald); }
    .toast.warning { border-left: 3px solid #fbbf24; }
    .toast.critical { border-left: 3px solid var(--red); }
    .toast.info .toast-icon    { color: var(--blue); }
    .toast.success .toast-icon { color: var(--emerald); }
    .toast.warning .toast-icon { color: #fbbf24; }
    .toast.critical .toast-icon { color: var(--red); }
    @keyframes toast-in {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes toast-out {
      from { opacity: 1; transform: translateX(0); }
      to { opacity: 0; transform: translateX(40px); }
    }
    /* Quick command bar */
    .quick-cmd-bar {
      position: fixed;
      bottom: 56px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1500;
      width: 480px;
      background: #111822;
      border: 1px solid var(--emerald);
      border-radius: 6px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: none;
    }
    .quick-cmd-bar.visible { display: flex; }
    .quick-cmd-prefix {
      padding: 8px 4px 8px 12px;
      color: var(--emerald);
      font-size: 14px;
      font-weight: 600;
    }
    .quick-cmd-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 8px 12px 8px 0;
      outline: none;
    }
    .quick-cmd-input::placeholder { color: var(--text-muted); }
    .quick-cmd-hints {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #0d1117;
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 6px 6px;
      max-height: 200px;
      overflow-y: auto;
      font-size: 11px;
    }
    .quick-cmd-hint {
      padding: 4px 12px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
    }
    .quick-cmd-hint:hover { background: #1a2a3e; }
    .quick-cmd-hint .cmd { color: var(--emerald); }
    .quick-cmd-hint .desc { color: var(--text-muted); font-size: 10px; }
    /* Nucleus portal links */
    .nucleus-link {
      display: inline-block;
      padding: 3px 8px;
      margin: 2px;
      border-radius: 3px;
      font-size: 10px;
      color: var(--blue);
      background: #60a5fa10;
      border: 1px solid #60a5fa30;
      text-decoration: none;
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: background 150ms;
    }
    .nucleus-link:hover {
      background: #60a5fa25;
      color: #93c5fd;
    }
    /* Session Feed styles */
    .sf-metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }
    .sf-metric {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3px 0;
      background: #0d111780;
      border-radius: 4px;
    }
    .sf-val {
      font-size: 16px;
      font-weight: 800;
      color: #38bdf8;
      line-height: 1.2;
      font-variant-numeric: tabular-nums;
    }
    .sf-lbl {
      font-size: 8px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .sf-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 0;
      font-size: 10px;
      border-bottom: 1px solid #1a223320;
      animation: sf-slide 0.2s ease;
    }
    .sf-item:last-child { border-bottom: none; }
    @keyframes sf-slide {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .sf-dot {
      width: 5px;
      height: 5px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .sf-label {
      flex: 1;
      color: var(--text-dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sf-time {
      color: var(--text-muted);
      font-size: 9px;
      flex-shrink: 0;
    }
    .sf-prop {
      display: block;
      color: var(--text-dim);
      font-size: 10px;
      margin-top: 2px;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    #sf-conn-dot { animation: pulse 2s infinite; }
    /* Session tabs */
    .sf-tab {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 9px;
      font-family: monospace;
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
      border: 1px solid transparent;
    }
    .sf-tab:hover { background: #ffffff08; }
    .sf-tab.active {
      color: var(--text);
      background: #38bdf810;
      border-color: #38bdf830;
    }
    .sf-tab-count {
      font-size: 8px;
      color: var(--text-muted);
      background: #ffffff08;
      padding: 0 3px;
      border-radius: 2px;
    }
    #sf-tabs::-webkit-scrollbar { height: 0; }
  </style>
  <link rel="stylesheet" href="xterm.css" />
</head>
<body>
  <div class="app">
    <div class="title-bar">
      <div class="left">
        <span class="brand">NexVigilant Terminal</span>
        <span class="status-dot disconnected" id="connection-status" title="Disconnected"></span>
      </div>
      <div class="right" style="-webkit-app-region:no-drag;">
        <button id="toggle-nucleus" title="Toggle Nucleus Portal (Ctrl+Shift+P)" style="background:none;border:1px solid var(--border);color:var(--blue);font-family:var(--font);font-size:10px;padding:2px 8px;border-radius:3px;cursor:pointer;">Portal</button>
        <button id="toggle-split" title="Split View (Ctrl+Shift+S)" style="background:none;border:1px solid var(--border);color:var(--emerald);font-family:var(--font);font-size:10px;padding:2px 8px;border-radius:3px;cursor:pointer;">Split</button>
        <span id="session-info">No session</span>
        <span id="terminal-size">--x--</span>
      </div>
    </div>
    <div class="tab-bar" id="tab-bar">
      <div class="tab-add" id="tab-add" title="New Session (Ctrl+Shift+N)">+</div>
    </div>
    <div class="main-area">
      <div id="terminal-container" tabindex="0" style="flex:1;position:relative;"></div>
      <div id="nucleus-frame-container" style="flex:1;display:none;border-left:1px solid var(--border);overflow:hidden;">
        <iframe id="nucleus-frame" src="http://localhost:9002" style="width:100%;height:100%;border:none;background:var(--bg-primary);"></iframe>
      </div>
      <div class="side-panel hidden" id="side-panel">
        <!-- Claude Session Feed (SSE from localhost:9800) -->
        <div class="side-panel-section" id="sf-section" style="display:none; flex: 1 1 auto;">
          <div class="side-panel-header">
            <span>Claude Session</span>
            <span style="display:flex;align-items:center;gap:6px;">
              <span id="sf-elapsed" style="font-size:10px;color:var(--text-muted);font-variant-numeric:tabular-nums">0:00</span>
              <span id="sf-conn-dot" style="width:6px;height:6px;border-radius:50%;background:#f87171;display:inline-block" title="Disconnected"></span>
            </span>
          </div>
          <div class="side-panel-body" style="padding:0;">
            <!-- Session tabs -->
            <div id="sf-tabs" style="display:flex;gap:2px;padding:4px 6px;overflow-x:auto;border-bottom:1px solid var(--border);flex-shrink:0;"></div>
            <div style="padding:6px 8px;">
            <!-- Compact metrics -->
            <div class="sf-metrics">
              <div class="sf-metric"><span class="sf-val" id="sf-tools">0</span><span class="sf-lbl">Tools</span></div>
              <div class="sf-metric"><span class="sf-val" id="sf-files">0</span><span class="sf-lbl">Files</span></div>
              <div class="sf-metric"><span class="sf-val" id="sf-reads">0</span><span class="sf-lbl">Reads</span></div>
              <div class="sf-metric"><span class="sf-val" id="sf-writes">0</span><span class="sf-lbl">Writes</span></div>
              <div class="sf-metric"><span class="sf-val" id="sf-bash">0</span><span class="sf-lbl">Bash</span></div>
              <div class="sf-metric"><span class="sf-val" id="sf-mcp">0</span><span class="sf-lbl">MCP</span></div>
            </div>
            <!-- Activity bar -->
            <div id="sf-bar" style="display:flex;height:4px;border-radius:2px;overflow:hidden;background:#334155;margin:6px 0;"></div>
            <!-- Verdict banner (hidden until verdict) -->
            <div id="sf-verdict" style="display:none;text-align:center;padding:4px 6px;border:1px solid var(--border);border-radius:4px;margin-bottom:6px;font-size:11px;"></div>
            <!-- Live feed -->
            <div id="sf-feed-list" style="max-height:240px;overflow-y:auto;"></div>
            </div>
          </div>
        </div>
        <div class="side-panel-section" style="flex: 0 0 auto;">
          <div class="side-panel-header">
            <span>Nucleus Portal</span>
          </div>
          <div class="side-panel-body" id="nucleus-links" style="padding: 4px 6px;">
            <a class="nucleus-link" href="#" data-url="http://localhost:9002" title="Main Portal">Dashboard</a>
            <a class="nucleus-link" href="#" data-url="http://localhost:9002/observatory" title="3D Signal Visualization">Observatory</a>
            <a class="nucleus-link" href="#" data-url="http://localhost:9002/academy" title="PV Education">Academy</a>
            <a class="nucleus-link" href="#" data-url="http://localhost:9002/vigilance" title="Signal Detection">Vigilance</a>
            <a class="nucleus-link" href="#" data-url="http://localhost:9002/glass" title="Glass Dashboard">Glass</a>
            <a class="nucleus-link" href="#" data-url="https://mcp.nexvigilant.com/tools" title="MCP Station Tools">Station</a>
          </div>
        </div>
        <div class="side-panel-section">
          <div class="side-panel-header">
            <span>Cloud Services</span>

  <script src="app.js"></script>
  <script>
    // Split-view controller: Terminal + Nucleus Portal
    (function() {
      const termContainer = document.getElementById('terminal-container');
      const nucleusContainer = document.getElementById('nucleus-frame-container');
      const nucleusFrame = document.getElementById('nucleus-frame');
      const toggleNucleus = document.getElementById('toggle-nucleus');
      const toggleSplit = document.getElementById('toggle-split');
      const nucleusLinks = document.querySelectorAll('.nucleus-link');
      let splitMode = 'terminal'; // 'terminal' | 'portal' | 'split'

      function setMode(mode) {
        splitMode = mode;
        switch(mode) {
          case 'terminal':
            termContainer.style.display = 'block';
            termContainer.style.flex = '1';
            nucleusContainer.style.display = 'none';
            toggleSplit.style.color = 'var(--text-muted)';
            toggleNucleus.style.color = 'var(--text-muted)';
            break;
          case 'portal':
            termContainer.style.display = 'none';
            nucleusContainer.style.display = 'block';
            nucleusContainer.style.flex = '1';
            toggleNucleus.style.color = 'var(--blue)';
            toggleSplit.style.color = 'var(--text-muted)';
            break;
          case 'split':
            termContainer.style.display = 'block';
            termContainer.style.flex = '1';
            nucleusContainer.style.display = 'block';
            nucleusContainer.style.flex = '1';
            toggleSplit.style.color = 'var(--emerald)';
            toggleNucleus.style.color = 'var(--blue)';
            break;
        }
        // Trigger terminal resize after layout change
        window.dispatchEvent(new Event('resize'));
      }

      toggleNucleus.addEventListener('click', function() {
        setMode(splitMode === 'portal' ? 'terminal' : 'portal');
      });

      toggleSplit.addEventListener('click', function() {
        setMode(splitMode === 'split' ? 'terminal' : 'split');
      });

      // Navigate Nucleus iframe when clicking portal links
      nucleusLinks.forEach(function(link) {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          var url = this.getAttribute('data-url');
          if (url) {
            nucleusFrame.src = url;
            if (splitMode === 'terminal') setMode('split');
          }
        });
      });

      // Keyboard shortcuts
      document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.shiftKey && e.key === 'P') {
          e.preventDefault();
          setMode(splitMode === 'portal' ? 'terminal' : 'portal');
        }
        if (e.ctrlKey && e.shiftKey && e.key === 'S') {
          e.preventDefault();
          setMode(splitMode === 'split' ? 'terminal' : 'split');
        }
      });
    })();
  </script>
</body>
