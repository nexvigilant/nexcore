# =============================================================================
# MIGRATION NOTES
# =============================================================================
#
# Hooks marked with `source: claude-hooks` and `migrate: true` need to be
# copied from ~/claude-hooks/examples/ to ~/.nexcore/crates/nexcore-hooks/bin/
#
# Migration steps:
#   1. Copy source file
#   2. Update imports: claude_hooks → nexcore_hooks
#   3. Add [[bin]] entry to Cargo.toml
#   4. cargo build --release
#   5. Remove `migrate: true` from this catalog
