[package]
name = "nexcore-registry"
version = "1.0.0"
edition = "2024"
rust-version = "1.85"
description = "SQLite registry for Claude Code skills, agents, metrics, and KPIs"
license = "MIT OR Apache-2.0"
repository.workspace = true
homepage.workspace = true

keywords = ["nexcore", "mathematics", "science"]
categories = ["science", "algorithms"]
[dependencies]
nexcore-error = { workspace = true }
rusqlite = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
serde_yml = { workspace = true }
nexcore-chrono = { workspace = true }
tracing = { workspace = true }
nexcore-fs = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[lints]
workspace = true
