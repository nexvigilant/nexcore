[package]
name = "nexcore-qbr"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
repository = "https://github.com/nexvigilant/nexcore"
rust-version = "1.85"
description = "Quantitative Benefit-Risk: computable, confidence-bounded benefit-risk assessment from contingency data"
keywords = ["benefit-risk", "pharmacovigilance", "signal-detection", "qbr"]
categories = ["science", "algorithms"]

[dependencies]
nexcore-pv-core = { version = "1.0.0", path = "../nexcore-pv-core", registry = "nexcore" }
nexcore-constants = { version = "1.0.0", path = "../nexcore-constants", registry = "nexcore" }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore" }
nexcore-primitives = { version = "1.0.0", path = "../nexcore-primitives", registry = "nexcore" }
nexcore-error = { workspace = true }
serde = { version = "1.0.204", features = ["derive"] }


[lints]
workspace = true
