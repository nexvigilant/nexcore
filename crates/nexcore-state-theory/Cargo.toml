
[package]
name = "nexcore-state-theory"
version = "0.1.0"
edition = "2024"
license = "LicenseRef-NexVigilant-Proprietary"
rust-version = "1.85"
description = "Universal Theory of State — domain-agnostic state machine foundations"
authors = ["Matthew Campion, PharmD <matthew@nexvigilant.com>"]
license-file = "LICENSE"
repository = "https://github.com/nexvigilant/nexcore"
keywords = ["state-machine", "typestate", "formal-verification", "theory"]
categories = ["data-structures", "no-std"]

[dependencies]
serde = { version = "1.0.204", features = ["derive"] }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore" }

[dev-dependencies]
proptest = "1.4"

[lints.rust]
async_fn_in_trait = "allow"
dead_code = "allow"
unused_imports = "allow"
unused_variables = "allow"
unused_mut = "allow"
unused_assignments = "allow"
unused_must_use = "allow"

[lints.clippy]
all = "allow"
pedantic = "allow"
nursery = "allow"
cargo = "allow"
map_unwrap_or = "allow"
manual_map = "allow"
option_map_or_none = "allow"
derivable_impls = "allow"
unwrap_used = "allow"
expect_used = "allow"
panic = "allow"
todo = "allow"
unimplemented = "allow"
unreachable = "allow"

[features]
default = ["std"]
std = []
kani = []
