
[package]
publish = false
name = "prima"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
repository.workspace = true
homepage.workspace = true
authors = ["NexVigilant Team <team@nexvigilant.com>"]
description = "Prima - A primitive-first programming language grounded in Lex Primitiva"
keywords = ["language", "primitives", "interpreter", "type-theory", "grounding"]
categories = ["compilers", "development-tools"]

[lib]
path = "src/lib.rs"

[[bin]]
name = "prima"
path = "src/bin/prima.rs"

[dependencies]
nexcore-error = { workspace = true }
lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", package = "nexcore-lex-primitiva" }
clap = { version = "4.5.11", features = ["derive", "cargo", "env"] }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
rustyline = "14"

[dev-dependencies]
proptest = { version = "1.6.0" }
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "compression"
harness = false


[lints]
workspace = true
