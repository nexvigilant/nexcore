[package]
name = "nexcore-immunity"
version = "0.1.0"
edition = "2024"
authors = ["Matthew Alexander Campion, PharmD <matthew@nexvigilant.com>"]
description = "Antipattern immunity system - self-healing code through learned antibodies"
license = "Proprietary"
repository = "https://github.com/nexvigilant/nexcore"
keywords = ["antipattern", "immunity", "homeostasis", "code-quality"]
categories = ["development-tools"]

[dependencies]
glob = { version = "0.3.1" }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore" }
nexcore-spliceosome = { version = "1.0.0", path = "../nexcore-spliceosome" }
regex = { version = "1.10.5" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
serde_yaml = { version = "0.9.34" }
thiserror = { version = "1.0.61" }
tracing = { version = "0.1.40" }

[dev-dependencies]
proptest = { version = "1.6.0" }

[lints.rust]
async_fn_in_trait = "allow"
dead_code = "allow"
unused_imports = "allow"
unused_variables = "allow"
unused_mut = "allow"
unused_assignments = "allow"
unused_must_use = "allow"

[lints.clippy]
all = "allow"
pedantic = "allow"
nursery = "allow"
cargo = "allow"
map_unwrap_or = "allow"
manual_map = "allow"
option_map_or_none = "allow"
derivable_impls = "allow"
unwrap_used = "allow"
expect_used = "allow"
panic = "allow"
todo = "allow"
unimplemented = "allow"
unreachable = "allow"
