
[package]
name = "nexcore-vault"
description = "Zero-dependency local encrypted secret manager using PBKDF2 + AES-256-GCM via ring"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "MIT OR Apache-2.0"
repository.workspace = true
homepage.workspace = true
rust-version = "1.85"

keywords = ["nexcore", "cryptography", "security"]
categories = ["cryptography"]
[dependencies]
nexcore-error = { workspace = true }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }
ring = "0.17"
nexcore-codec = { version = "0.1.0", path = "../nexcore-codec" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
nexcore-chrono = { workspace = true }
nexcore-fs = { workspace = true }
toml = { version = "0.8.15" }
tracing = { version = "0.1.40" }
clap = { version = "4.5.11", features = ["derive", "cargo", "env"] }
rand = { version = "0.9.0" }

[dev-dependencies]
tempfile = { version = "3.10.1" }


[lints]
workspace = true
