
[package]
name = "signal"
version = "1.1.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository = "https://github.com/nexvigilant/nexcore"
homepage.workspace = true
rust-version = "1.85"
description = "Thin re-export wrapper for nexcore-signal-pipeline — the canonical signal detection pipeline"

# NOTE: This crate is a thin wrapper. The canonical implementation lives in
# nexcore-signal-pipeline. New consumers should depend on that crate directly.

autobins = false

keywords = ["nexcore", "pharmacovigilance", "drug-safety"]
categories = ["science"]
[lib]
path = "src/lib.rs"

[dependencies]
nexcore-signal-pipeline = { version = "1.0.0", path = "../nexcore-signal-pipeline" }
nexcore-chrono = { workspace = true }
nexcore-lex-primitiva = { workspace = true }
nexcore-error = { workspace = true }

[lints]
workspace = true
