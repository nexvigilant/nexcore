# NexCore Hooks Catalog
# =====================
# All available hooks with metadata for config generation.
#
# Usage:
#   nexcore hooks list                    # Show all hooks
#   nexcore hooks enable <hook>           # Add to current config
#   nexcore hooks generate --tier=dev     # Generate settings.json
#
# Tiers:
#   dev     - Fast iteration, minimal blocking
#   review  - Quality checks, warnings
#   deploy  - Full validation, strict blocking
#   all     - Every hook (for reference only)

# =============================================================================
# SESSION LIFECYCLE
# =============================================================================

SessionStart:
  sessionstart_orphan_killer:
    description: "Kills orphaned Claude processes from previous sessions"
    tier: [dev, review, deploy]
    timeout: 5
    blocking: false

  session_continuity_prompt:
    description: "Prompts user about previous session handoffs"
    tier: [dev, review, deploy]
    timeout: 5
    blocking: false

  sessionstart_skill_loader:
    description: "Loads skill definitions at session start"
    tier: [review, deploy]
    timeout: 5
    blocking: false

  session_handoff_loader:
    description: "Loads previous session handoff context"
    tier: [review, deploy]
    timeout: 5
    blocking: false

  # From claude-hooks library (to migrate)
  session_context:
    description: "Injects session info, git status, project type, CWD"
    tier: [dev, review, deploy]
    timeout: 5
    blocking: false
    source: claude-hooks
    migrate: true

  git_context:
    description: "Injects git branch and last commit info"
    tier: [dev, review, deploy]
    timeout: 5
    blocking: false
    source: claude-hooks
    migrate: true

SessionEnd:
  sessionend_cleanup:
    description: "Cleans up temporary files and state"
    tier: [review, deploy]
    timeout: 5
    blocking: false

  hook_metrics_reporter:
    description: "Reports hook execution metrics summary"
    tier: [review, deploy]
    timeout: 5
    blocking: false

  session_handoff_generator:
    description: "Generates handoff document for session continuity"
    tier: [review, deploy]
    timeout: 10
    blocking: false

# =============================================================================
# PRE-TOOL USE: BASH
# =============================================================================

PreToolUse:Bash:
  pretool_bash_interceptor:
    description: "Intercepts and validates shell commands"
    tier: [deploy]
    timeout: 3
    blocking: true

  # From claude-hooks library (to migrate)
  bash_validator:
    description: "Blocks dangerous commands (rm -rf /), suggests rg/fd over grep/find"
    tier: [dev, review, deploy]
    timeout: 3
    blocking: true
    source: claude-hooks
    migrate: true

