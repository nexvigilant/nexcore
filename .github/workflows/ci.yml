name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          components: rustfmt, clippy
      - uses: actions/cache@v4
        with:
          path: target
          key: lint-${{ hashFiles('Cargo.lock') }}
      - name: Disable sccache for CI
        run: |
          sed -i 's/rustc-wrapper = "sccache"/# rustc-wrapper disabled in CI/' .cargo/config.toml
          sed -i 's/RUSTC_WRAPPER = "sccache"/# RUSTC_WRAPPER disabled in CI/' .cargo/config.toml
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - uses: actions/cache@v4
        with:
          path: target
          key: test-${{ hashFiles('Cargo.lock') }}
      - name: Disable sccache for CI
        run: |
          sed -i 's/rustc-wrapper = "sccache"/# rustc-wrapper disabled in CI/' .cargo/config.toml
          sed -i 's/RUSTC_WRAPPER = "sccache"/# RUSTC_WRAPPER disabled in CI/' .cargo/config.toml
      - name: Run tests
        run: cargo test --workspace --lib

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - uses: actions/cache@v4
        with:
          path: target
          key: build-${{ hashFiles('Cargo.lock') }}
      - name: Disable sccache for CI
        run: |
          sed -i 's/rustc-wrapper = "sccache"/# rustc-wrapper disabled in CI/' .cargo/config.toml
          sed -i 's/RUSTC_WRAPPER = "sccache"/# RUSTC_WRAPPER disabled in CI/' .cargo/config.toml
      - name: Build workspace
        run: cargo build --workspace
