
[package]
name = "gsheets-mcp"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
description = "MCP server for Google Sheets API v4 with service account JWT auth"

[[bin]]
name = "gsheets-mcp"
path = "src/main.rs"

[dependencies]
nexcore-error = { workspace = true }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
tracing = { version = "0.1.40" }
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }
tokio = { version = "1.38.0", features = ["full"] }
nexcore-chrono = { workspace = true }
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
rmcp = { version = "0.14", features = ["server", "transport-io"] }
schemars = "1.2"
jsonwebtoken = "9"

[dev-dependencies]
serde_json = { version = "1.0.120" }


[lints]
workspace = true
