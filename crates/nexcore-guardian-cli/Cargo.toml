
[package]
name = "nexcore-nvrepl"
version = "1.0.0"
edition = "2024"
rust-version = "1.85"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository.workspace = true
homepage.workspace = true
description = "NexVigilant REPL — deterministic terminal interface for PV signal detection, patient safety, and system monitoring"

keywords = ["nexcore", "pharmacovigilance", "drug-safety"]
categories = ["science"]
[[bin]]
name = "nvrepl"
path = "src/main.rs"

[dependencies]
nexcore-vigilance = { version = "1.0.0", path = "../nexcore-vigilance" }
nexcore-guardian-engine = { version = "1.0.0", path = "../nexcore-guardian-engine" }
nexcore-pv-core = { version = "1.0.0", path = "../nexcore-pv-core" }
nexcore-energy = { version = "0.1.0", path = "../nexcore-energy" }
rustyline = "15.0"
colored = { version = "3.0.0" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
tokio = { version = "1.38.0", features = ["full"] }
tracing = { version = "0.1.40" }
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }
nexcore-error = { workspace = true }


[lints]
workspace = true
