[package]
name = "nexcore-metabolite"
version = "0.1.0"
edition = "2024"
description = "Phase I/II metabolite and degradant prediction engine"
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository.workspace = true
homepage.workspace = true

keywords = ["nexcore", "pharmacovigilance"]
categories = ["development-tools"]
[dependencies]
nexcore-error = { workspace = true }
nexcore-molcore = { path = "../nexcore-molcore", version = "0.1.0" }
prima-chem = { path = "../prima-chem", version = "0.1.0" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }


[lints]
workspace = true
