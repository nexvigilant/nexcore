
[package]
name = "crate-converter"
version = "0.1.0"
edition = "2024"
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository.workspace = true
homepage.workspace = true
rust-version = "1.85"
description = "Converts workspace-dependent Cargo.toml files to standalone packages for registry publishing"

keywords = ["nexcore", "build-tools", "publishing"]
categories = ["development-tools"]
[dependencies]
toml_edit = "0.22"
clap = { version = "4.5", features = ["derive"] }
nexcore-error = { workspace = true }
walkdir = "2.5"

[dev-dependencies]
pretty_assertions = "1.4"
