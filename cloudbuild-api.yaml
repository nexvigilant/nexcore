# Cloud Build configuration for nexcore-api
# Builds container image using Dockerfile.api
# Deployment handled by deploy-cloudrun.sh (not Cloud Build)

steps:
  # Build the container image using API-specific Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.api'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nexcore-api:${_TAG}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nexcore-api:latest'
      - '.'

images:
  - 'gcr.io/$PROJECT_ID/nexcore-api:${_TAG}'
  - 'gcr.io/$PROJECT_ID/nexcore-api:latest'

substitutions:
  _TAG: 'latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '100'

timeout: '2400s'
