
[package]
name = "perplexity-mcp"
version = "1.0.0"
edition = "2024"
rust-version = "1.85"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
description = "MCP server for Perplexity AI search-grounded research with citations"

[[bin]]
name = "perplexity-mcp"
path = "src/main.rs"

[dependencies]
nexcore-perplexity = { version = "1.0.0", path = "../nexcore-perplexity", registry = "nexcore" }
rmcp = { version = "0.14", features = ["server", "transport-io"] }
schemars = "1.2"
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
tokio = { version = "1.38.0", features = ["full"] }
anyhow = { version = "1.0.86" }
thiserror = { version = "1.0.61" }

[dev-dependencies]
serde_json = { version = "1.0.120" }

[lints.rust]
async_fn_in_trait = "allow"
dead_code = "allow"
unused_imports = "allow"
unused_variables = "allow"
unused_mut = "allow"
unused_assignments = "allow"
unused_must_use = "allow"

[lints.clippy]
all = "allow"
pedantic = "allow"
nursery = "allow"
cargo = "allow"
map_unwrap_or = "allow"
manual_map = "allow"
option_map_or_none = "allow"
derivable_impls = "allow"
unwrap_used = "allow"
expect_used = "allow"
panic = "allow"
todo = "allow"
unimplemented = "allow"
unreachable = "allow"
