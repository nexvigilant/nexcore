
[package]
name = "nexcore-vault"
description = "Zero-dependency local encrypted secret manager using PBKDF2 + AES-256-GCM via ring"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
rust-version = "1.85"

[dependencies]
nexcore-error = { workspace = true }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore" }
ring = "0.17"
nexcore-codec = { version = "0.1.0", path = "../nexcore-codec", registry = "nexcore" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
chrono = { version = "0.4.38", features = ["serde"] }
nexcore-fs = { workspace = true }
toml = { version = "0.8.15" }
tracing = { version = "0.1.40" }
clap = { version = "4.5.11", features = ["derive", "cargo", "env"] }
rand = { version = "0.9.0" }

[dev-dependencies]
tempfile = { version = "3.10.1" }

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = "warn"
pedantic = "warn"
nursery = "warn"
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
module_name_repetitions = "allow"
doc_markdown = "allow"
missing_const_for_fn = "allow"
cast_possible_truncation = "allow"
option_if_let_else = "allow"
significant_drop_tightening = "allow"
