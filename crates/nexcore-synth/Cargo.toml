
[package]
name = "nexcore-synth"
version = "0.1.0"
edition = "2024"
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository.workspace = true
homepage.workspace = true
readme = "README.md"
description = "Autonomous primitive synthesis engine — Level 5 Evolution tool"

keywords = ["nexcore", "foundation", "primitives"]
categories = ["development-tools"]
[dependencies]
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }
nexcore-transcriptase = { version = "1.0.0", path = "../nexcore-transcriptase" }
antitransformer = { version = "1.0.0", path = "../antitransformer" }
nexcore-id = { version = "0.1.0", path = "../nexcore-id" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
nexcore-error = { workspace = true }
tracing = { version = "0.1.40" }


[lints]
workspace = true
