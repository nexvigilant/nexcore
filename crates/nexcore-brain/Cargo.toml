
[package]
name = "nexcore-brain"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
repository = "https://github.com/nexvigilant/nexcore"
rust-version = "1.85"
description = "Antigravity-style brain system for Claude Code - working memory, artifact versioning, and content-addressable code tracking"
keywords = ["claude-code", "brain", "memory", "versioning", "artifacts"]
categories = ["development-tools", "command-line-utilities"]

[[bin]]
name = "brain"
path = "src/main.rs"

[dependencies]
# Serialization
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }

# Error handling - uses own BrainError (manual impl, zero deps)

# Date/time and UUIDs
chrono = { version = "0.4.38", features = ["serde"] }
nexcore-id = { version = "0.1.0", path = "../nexcore-id", registry = "nexcore", features = ["serde"] }

# Cryptographic hashing for content-addressable storage
sha2 = { version = "0.10.8" }
hex = { version = "0.4.3" }

# File system operations
dirs = { version = "5.0.1" }

# Foundation primitives (BathroomLock for file write protection)
nexcore-constants = { version = "1.0.0", path = "../nexcore-constants", registry = "nexcore" }

# Tracing for diagnostics
tracing = { version = "0.1.40" }

# Persistent SQLite storage (dual-write alongside JSON files)
nexcore-db = { version = "1.0.0", path = "../nexcore-db", registry = "nexcore" }

# Amplitude growth learning model
nexcore-synapse = { version = "1.0.0", path = "../nexcore-synapse", registry = "nexcore" }

# Lex Primitiva grounding
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore" }

# Insight trait adapter
nexcore-insight = { version = "0.1.0", path = "../nexcore-insight", registry = "nexcore", optional = true }

# CLI
clap = { version = "4.5.11", features = ["derive", "cargo", "env"] }

[features]
default = ["insight"]
insight = ["dep:nexcore-insight"]

[dev-dependencies]
tempfile = { version = "3.10.1" }
proptest = "1.6"
anyhow = { version = "1.0.86" }

[lints.rust]
async_fn_in_trait = "allow"
dead_code = "allow"
unused_imports = "allow"
unused_variables = "allow"
unused_mut = "allow"
unused_assignments = "allow"
unused_must_use = "allow"

[lints.clippy]
all = "allow"
pedantic = "allow"
nursery = "allow"
cargo = "allow"
map_unwrap_or = "allow"
manual_map = "allow"
option_map_or_none = "allow"
derivable_impls = "allow"
unwrap_used = "allow"
expect_used = "allow"
panic = "allow"
todo = "allow"
unimplemented = "allow"
unreachable = "allow"
