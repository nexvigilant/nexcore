[package]
name = "nexcore-terminal-mcp"
version = "0.1.0"
edition = "2024"
authors = ["Matthew Campion, PharmD <matthew@nexvigilant.com>"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/nexvigilant/nexcore"
homepage.workspace = true
rust-version = "1.85"
description = "MCP server for controlling NexVigilant Terminal — PTY, sessions, layout, and UI"

keywords = ["nexcore", "mcp", "terminal"]
categories = ["development-tools"]

[[bin]]
name = "nexcore-terminal-mcp"
path = "src/main.rs"

[dependencies]
nexcore-terminal = { path = "../nexcore-terminal", version = "0.1.0" }
nexcore-chrono = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
rmcp = { version = "0.14", features = ["server", "transport-io"] }
schemars = { version = "1.0" }

[lints]
workspace = true
