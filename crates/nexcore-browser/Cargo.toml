
[package]
name = "nexcore-browser"
version = "0.1.0"
edition = "2024"
authors = ["NexVigilant Team", "Matthew Campion"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/nexvigilant/nexcore"
rust-version = "1.85"
description = "Browser automation foundation for Vigil/Guardian ecosystem"

[dependencies]
nexcore-error = { workspace = true }
# Lex Primitiva
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }

# Browser automation
chromiumoxide = { version = "0.7", features = ["tokio-runtime"], default-features = false }

# Async runtime
tokio = { version = "1.47", features = ["full"] }
futures = "0.3"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0.120" }

# Time
nexcore-chrono = { workspace = true }

# Concurrency
parking_lot = "0.12"

# Error handling

# Logging
tracing = "0.1"

[dev-dependencies]
tokio-test = "0.4"


[lints]
workspace = true
