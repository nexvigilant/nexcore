
[package]
name = "nexcore-claude-hooks"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
description = "Claude Code hooks - Pre/Post tool use interceptors merged from .claude/hooks/"

[dependencies]
nexcore-hook-lib = { version = "1.0.0", path = "../nexcore-hook-lib", registry = "nexcore", features = ["cytokine"] }
nexcore-hook-metrics = { version = "1.0.0", path = "../nexcore-hook-metrics", registry = "nexcore" }
nexcore-brain = { version = "1.0.0", path = "../nexcore-brain", registry = "nexcore" }
nexcore-transcriptase = { version = "1.0.0", path = "../nexcore-transcriptase", registry = "nexcore" }
nexcore-ribosome = { version = "1.0.0", path = "../nexcore-ribosome", registry = "nexcore" }
nexcore-cytokine = { version = "1.0.0", path = "../nexcore-cytokine", registry = "nexcore" }
nexcore-immunity = { version = "0.1.0", path = "../nexcore-immunity", registry = "nexcore" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
chrono = { version = "0.4.38", features = ["serde"] }
regex = { version = "1.10.5" }

[lints.rust]
async_fn_in_trait = "allow"
dead_code = "allow"
unused_imports = "allow"
unused_variables = "allow"
unused_mut = "allow"
unused_assignments = "allow"
unused_must_use = "allow"

[lints.clippy]
all = "allow"
pedantic = "allow"
nursery = "allow"
cargo = "allow"
map_unwrap_or = "allow"
manual_map = "allow"
option_map_or_none = "allow"
derivable_impls = "allow"
unwrap_used = "allow"
expect_used = "allow"
panic = "allow"
todo = "allow"
unimplemented = "allow"
unreachable = "allow"

# ─────────────────────────────────────────────────────────────────────────────
# Binary entries - each corresponds to a hook from .claude/hooks/
# ─────────────────────────────────────────────────────────────────────────────

[[bin]]
name = "atomic-agent-enforcer"
path = "bin/atomic-agent-enforcer.rs"

[[bin]]
name = "clippy-enforcer"
path = "bin/clippy-enforcer.rs"

[[bin]]
name = "command-injection-detector"
path = "bin/command-injection-detector.rs"

[[bin]]
name = "compile-verifier"
path = "bin/compile-verifier.rs"

[[bin]]
name = "compound-growth-miner"
path = "bin/compound-growth-miner.rs"

[[bin]]
name = "ignored-result-detector"
path = "bin/ignored-result-detector.rs"

[[bin]]
name = "immunity-learner"
path = "bin/immunity-learner.rs"

