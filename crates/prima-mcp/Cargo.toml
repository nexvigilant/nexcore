
[package]
name = "prima-mcp"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository.workspace = true
homepage.workspace = true
authors = ["NexVigilant Team <team@nexvigilant.com>"]
description = "Prima-to-MCP compiler - expose Prima functions as MCP tools"

keywords = ["nexcore", "mcp", "api"]
categories = ["web-programming"]
[[bin]]
name = "prima-mcp"
path = "src/main.rs"

[dependencies]
prima = { version = "0.1.0", path = "../prima" }
prima-academy = { version = "0.1.0", path = "../prima-academy" }
lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", package = "nexcore-lex-primitiva" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }

[dev-dependencies]
proptest = { version = "1.6.0" }


[lints]
workspace = true
