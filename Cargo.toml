[workspace]
members = [
    "crates/claude-knowledge-mcp",
    "crates/*",
    "tools/*",
]
exclude = [
    "crates/nexcore-claude-hooks",
    "crates/nexcore-hooks",
    "crates/word-spectroscopy",
    "crates/nexcore-bridge-mcp",
]
resolver = "2"

[workspace.package]
version = "1.0.0"
edition = "2024"
rust-version = "1.85"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
description = "NexVigilant Core (nexcore) — The Vigilance Kernel for pharmacovigilance and intelligent automation"
license = "LicenseRef-Proprietary"
repository = "https://github.com/nexvigilant/nexcore"

[workspace.dependencies]
# anyhow — REMOVED: replaced by nexcore-error
axum = { version = "0.8.0", features = ["macros", "ws"] }
# base64 — REPLACED by nexcore-codec (sovereignty campaign Phase 2)
burn = { version = "0.20", default-features = false, features = ["ndarray", "autodiff", "std"] }
burn-ndarray = { version = "0.20", features = ["std"] }
bytes = "1.6.1"
# candle-core = "0.9"
# candle-nn = "0.9"
# candle-transformers = "0.9"
chrono = { version = "0.4.38", features = ["serde"] }
clap = { version = "4.5.11", features = ["derive", "cargo", "env"] }
# dirs — REPLACED by nexcore-fs::dirs (sovereignty campaign)
flate2 = "1.0.30"
futures = "0.3.30"
# glob — REPLACED by nexcore-fs::glob (sovereignty campaign)
# hex — REPLACED by nexcore-codec (sovereignty campaign Phase 2)
http-body-util = "0.1.2"
jsonwebtoken = "9"
# once_cell — REMOVED: migrated to std::sync::LazyLock (Rust 1.80+)
phf = { version = "0.11.2", features = ["macros"] }
proc-macro2 = "1.0.86"
proptest = "1.6.0"
quote = "1.0.36"
rand = "0.9.0"
rayon = "1.10"
regex = "1.10.5"
reqwest = { version = "0.12.5", features = ["json"] }
rusqlite = { version = "0.32", features = ["bundled", "serde_json"] }
