
[package]
name = "nexcore-mesh"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository = "https://github.com/nexvigilant/nexcore"
homepage.workspace = true
rust-version = "1.85"
description = "Runtime mesh networking with discovery, gossip, and resilience — grounded to 14/16 T1 primitives"

keywords = ["nexcore", "foundation", "primitives"]
categories = ["development-tools"]
[dependencies]
nexcore-error = { workspace = true }
nexcore-primitives = { version = "1.0.0", path = "../nexcore-primitives" }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }
nexcore-cytokine = { version = "1.0.0", path = "../nexcore-cytokine" }
nexcore-clearance = { version = "1.0.0", path = "../nexcore-clearance" }
nexcore-chrono = { workspace = true }
tokio = { version = "1.38.0", features = ["full"] }
dashmap = { version = "6.0.1" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
nexcore-id = { workspace = true }
tracing = { version = "0.1.40" }

[dev-dependencies]
tokio = { version = "1.38.0", features = ["full"] }


[lints]
workspace = true
