
[package]
name = "nexcore-docs-mcp"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository.workspace = true
homepage.workspace = true
description = "MCP server for Claude Code documentation - consolidated from projects/claude-code-docs-mcp"

keywords = ["nexcore", "mcp", "api"]
categories = ["web-programming"]
[[bin]]
name = "nexcore-docs-mcp"
path = "src/main.rs"

[dependencies]
nexcore-constants = { version = "1.0.0", path = "../nexcore-constants" }

# MCP SDK
rmcp = { version = "0.14", features = ["server", "transport-io"] }
tokio = { version = "1.38.0", features = ["full"] }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }

# HTTP client for fetching docs
reqwest = { version = "0.12", features = ["json"] }
nexcore-error = { workspace = true, features = ["mcp", "tokio_runtime", "tracing_filter"] }

# Caching
moka = { version = "0.12", features = ["future"] }


[lints]
workspace = true
