
[package]
name = "stem-phys"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Physics primitives: conservation, forces, waves, scaling"
license = "MIT OR Apache-2.0"
repository = "https://github.com/nexvigilant/stem"
homepage.workspace = true
keywords = ["physics", "conservation", "forces", "primitives"]
categories = ["science"]
publish = true

[dependencies]
nexcore-error = { workspace = true }
stem-core = { version = "0.1.0", path = "../stem-core" }
stem-complex = { workspace = true }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }
serde = { version = "1.0.204", features = ["derive"] }

[dev-dependencies]

[lints]
workspace = true
