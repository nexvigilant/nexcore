[workspace]

[package]
name = "nexcore-api"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
repository = "https://github.com/nexvigilant/nexcore"
rust-version = "1.85"
description = "NexVigilant Core REST API - HTTP interface for pharmacovigilance and skill operations"

[[bin]]
name = "nexcore-api"
path = "src/main.rs"

[dependencies]
# Internal crates
nexcore-vigilance = { version = "1.0.0", path = "../nexcore-vigilance", registry = "nexcore" }
nexcore-vigil = { version = "0.1.0", path = "../nexcore-vigil", registry = "nexcore" }
nexcore-pv-core = { version = "1.0.0", path = "../nexcore-pv-core", registry = "nexcore" }
nexcore-primitives = { version = "1.0.0", path = "../nexcore-primitives", registry = "nexcore" }
nexcore-core = { version = "1.0.0", path = "../nexcore-core", registry = "nexcore" }
nexcore-skill-exec = { version = "1.0.0", path = "../nexcore-skill-exec", registry = "nexcore" }
nexcore-state-os = { version = "0.1.0", path = "../nexcore-state-os", registry = "nexcore" }
nexcore-mesh = { version = "1.0.0", path = "../nexcore-mesh", registry = "nexcore" }
signal = { version = "1.0.0", path = "../signal", registry = "nexcore" }

# HTTP server
axum = { version = "0.8.8", features = ["ws"] }
tower-http = { version = "0.5.2", features = ["cors", "trace", "compression-full"] }
tokio = { version = "1.38.0", features = ["full", "sync"] }

# Serialization
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }

# Error handling
anyhow = { version = "1.0.86" }

# Logging
tracing = { version = "0.1.40" }
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }

# OpenAPI
utoipa = { version = "5.3", features = ["axum_extras"] }
utoipa-scalar = { version = "0.3", features = ["axum"] }

# HTTP client (for FRIDAY/Qdrant health checks)
reqwest = { version = "0.12", features = ["json"] }

# Utilities
chrono = { version = "0.4.38", features = ["serde"] }
dirs = { version = "5.0.1" }
nexcore-id = { version = "0.1.0", path = "../nexcore-id", registry = "nexcore", features = ["serde"] }
shellexpand = "3.1"
uuid = { version = "1.10.0", features = ["v4", "serde"] }

[dev-dependencies]
tempfile = { version = "3.10.1" }
tower = { version = "0.4.13", features = ["full", "util"] }

[lints.rust]
async_fn_in_trait = "allow"
dead_code = "allow"
unused_imports = "allow"
unused_variables = "allow"
unused_mut = "allow"
unused_assignments = "allow"
unused_must_use = "allow"

[lints.clippy]
all = "allow"
pedantic = "allow"
nursery = "allow"
cargo = "allow"
map_unwrap_or = "allow"
manual_map = "allow"
option_map_or_none = "allow"
derivable_impls = "allow"
unwrap_used = "allow"
expect_used = "allow"
panic = "allow"
todo = "allow"
unimplemented = "allow"
unreachable = "allow"
