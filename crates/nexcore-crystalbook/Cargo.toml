[package]
name = "nexcore-crystalbook"
version = "0.1.0"
edition = "2024"
authors = ["Matthew Campion, PharmD <matthew@camp-corp.com>"]
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository = "https://github.com/nexvigilant/nexcore"
homepage.workspace = true
rust-version = "1.85"
description = "The Crystalbook — immutable, content-addressed scientific documents with Merkle integrity and cryptographic seal chains"

keywords = ["nexcore", "mathematics", "science"]
categories = ["science", "algorithms"]
[lib]
path = "src/lib.rs"

[[bin]]
name = "crystalbook"
path = "src/main.rs"

[dependencies]
nexcore-chrono = { workspace = true }
nexcore-codec = { workspace = true }
nexcore-hash = { workspace = true }
nexcore-id = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

[lints]
workspace = true
