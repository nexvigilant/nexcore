
[package]
name = "stem-bio"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Biological system primitives: endocrine, immune, neural"
license = "MIT OR Apache-2.0"
repository = "https://github.com/nexvigilant/stem"
keywords = ["biology", "endocrine", "immune", "primitives"]
categories = ["science"]
publish = true

[dependencies]
stem-core = { version = "0.1.0", path = "../stem-core", registry = "nexcore" }
nexcore-hormones = { version = "1.0.0", path = "../nexcore-hormones", registry = "nexcore" }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore" }
serde = { version = "1.0.204", features = ["derive"] }

[dev-dependencies]
