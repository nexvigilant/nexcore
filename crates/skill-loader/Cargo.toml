
[package]
name = "skill-loader"
version = "0.1.0"
edition = "2024"
description = "Load SKILL.md files and bridge to Rust skill crates"
license = "MIT"

[dependencies]
nexcore-error = { workspace = true }
skill-core = { version = "0.1.0", path = "../skill-core", registry = "nexcore"}
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"
nexcore-fs = { workspace = true }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore"}
