
[package]
name = "nexcore-primitive-scanner"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
description = "Automated primitive extraction with CLI, MCP, and hook integration"

[dependencies]
# Core
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { workspace = true }

# Flywheel integration
nexcore-flywheel = { path = "../nexcore-flywheel" }

# CLI
clap = { version = "4", features = ["derive"] }

# Graph operations
indexmap = { version = "2", features = ["serde"] }

[dev-dependencies]
tempfile = { version = "3.10.1" }

[[bin]]
name = "primitive-scanner"
path = "src/bin/scanner.rs"

[lints]
workspace = true
