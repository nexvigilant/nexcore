
[package]
name = "nexcore-phenotype"
version = "1.0.0"
edition = "2024"
rust-version = "1.85"
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository.workspace = true
homepage.workspace = true
readme = "README.md"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
description = "Adversarial test fixture generator — produces schema mutations for drift detection testing"

keywords = ["nexcore", "biology", "medical"]
