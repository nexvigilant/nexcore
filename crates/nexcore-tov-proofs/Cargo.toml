[workspace]

[package]
name = "nexcore-tov-proofs"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-Proprietary"
description = "Curry-Howard proof verification for Theory of Vigilance - Theorems as Types, Proofs as Programs"
keywords = ["proof-verification", "curry-howard", "type-theory", "vigilance", "formal-methods"]
categories = ["algorithms", "science", "mathematics"]

[dependencies]
nexcore-constants = { version = "1.0.0", path = "../nexcore-constants", registry = "nexcore" }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore" }
typenum = { version = "1.17.0" }

[features]
# Enable Kani verification harnesses
kani = []

[lints.rust]
async_fn_in_trait = "allow"
dead_code = "allow"
unused_imports = "allow"
unused_variables = "allow"
unused_mut = "allow"
unused_assignments = "allow"
unused_must_use = "allow"

[lints.clippy]
all = "allow"
pedantic = "allow"
nursery = "allow"
cargo = "allow"
map_unwrap_or = "allow"
manual_map = "allow"
option_map_or_none = "allow"
derivable_impls = "allow"
unwrap_used = "allow"
expect_used = "allow"
panic = "allow"
todo = "allow"
unimplemented = "allow"
unreachable = "allow"
