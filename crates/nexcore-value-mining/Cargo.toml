
[package]
name = "nexcore-value-mining"
version = "1.0.0"
edition = "2024"
rust-version = "1.85"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository = "https://github.com/nexvigilant/nexcore"
homepage.workspace = true
description = "Economic value signal detection using PV algorithms"

keywords = ["nexcore", "pharmacovigilance", "drug-safety"]
categories = ["science"]
[dependencies]
# Lex Primitiva grounding
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }

# Social media types (extracted from nexcore-social for DV7 resolution)
nexcore-social-types = { version = "1.0.0", path = "../nexcore-social-types" }

# Serialization
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }

# Error handling
nexcore-error = { workspace = true }

# Async runtime
tokio = { version = "1.38.0", features = ["full"] }

# Logging
tracing = { version = "0.1.40" }

# Time
nexcore-chrono = { workspace = true }

[dev-dependencies]
tempfile = { version = "3.10.1" }


[lints]
workspace = true
