
[package]
name = "dag-publish"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
repository.workspace = true
homepage.workspace = true
rust-version = "1.85"
description = "Topological DAG publisher for nexcore crates — scans Cargo.toml files, builds dependency graph, and publishes in correct order"

keywords = ["nexcore", "build-tools", "publishing"]
categories = ["development-tools"]
[dependencies]
toml = "0.8"
clap = { version = "4.5", features = ["derive"] }
nexcore-error = { workspace = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = { workspace = true }

[dev-dependencies]
tempfile = "3.10"
