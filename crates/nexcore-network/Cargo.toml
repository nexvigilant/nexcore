
[package]
name = "nexcore-network"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "NexCore OS networking subsystem — connection management, DNS, firewall, routing, monitoring"
authors = ["Matthew Campion, PharmD <matthew@nexvigilant.com>"]
license = "LicenseRef-NexVigilant-Proprietary"
repository = "https://github.com/nexvigilant/nexcore"
keywords = ["networking", "dns", "firewall", "routing", "os"]
categories = ["network-programming", "os"]

[dependencies]
serde = { version = "1.0.204", features = ["derive"] }
chrono = { version = "0.4.38", features = ["serde"] }
thiserror = { version = "1.0.61" }

[lints.rust]
async_fn_in_trait = "allow"
dead_code = "allow"
unused_imports = "allow"
unused_variables = "allow"
unused_mut = "allow"
unused_assignments = "allow"
unused_must_use = "allow"

[lints.clippy]
all = "allow"
pedantic = "allow"
nursery = "allow"
cargo = "allow"
map_unwrap_or = "allow"
manual_map = "allow"
option_map_or_none = "allow"
derivable_impls = "allow"
unwrap_used = "allow"
expect_used = "allow"
panic = "allow"
todo = "allow"
unimplemented = "allow"
unreachable = "allow"
