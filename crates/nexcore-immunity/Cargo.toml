[package]
name = "nexcore-immunity"
version = "0.1.0"
edition = "2024"
authors = ["Matthew Alexander Campion, PharmD <matthew@nexvigilant.com>"]
description = "Antipattern immunity system - self-healing code through learned antibodies"
license = "LicenseRef-NexVigilant-Proprietary"
repository = "https://github.com/nexvigilant/nexcore"
keywords = ["antipattern", "immunity", "homeostasis", "code-quality"]
categories = ["development-tools"]

[dependencies]
nexcore-error = { workspace = true }
nexcore-fs = { workspace = true }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore" }
nexcore-spliceosome = { version = "1.0.0", path = "../nexcore-spliceosome" }
regex = { version = "1.10.5" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
serde_yaml = { version = "0.9.34" }
tracing = { version = "0.1.40" }

[dev-dependencies]
proptest = { version = "1.6.0" }

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = "warn"
pedantic = "warn"
nursery = "warn"
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
module_name_repetitions = "allow"
doc_markdown = "allow"
missing_const_for_fn = "allow"
cast_possible_truncation = "allow"
option_if_let_else = "allow"
significant_drop_tightening = "allow"
