
[package]
name = "nexcore-signal-fence"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Process-level network signal container — default-deny fence grounded in signal theory"
authors = ["Matthew Campion, PharmD <matthew@nexvigilant.com>"]
license = "LicenseRef-NexVigilant-Proprietary"
repository = "https://github.com/nexvigilant/nexcore"
keywords = ["signal-detection", "network-security", "process-monitor", "firewall"]
categories = ["network-programming", "os"]

[dependencies]
nexcore-signal-theory = { version = "0.1.0", path = "../nexcore-signal-theory", registry = "nexcore" }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
chrono = { version = "0.4.38", features = ["serde"] }
ipnetwork = "0.20"
tracing = { version = "0.1.40" }

[lints.rust]
async_fn_in_trait = "allow"
dead_code = "allow"
unused_imports = "allow"
unused_variables = "allow"
unused_mut = "allow"
unused_assignments = "allow"
unused_must_use = "allow"

[lints.clippy]
all = "allow"
pedantic = "allow"
nursery = "allow"
cargo = "allow"
map_unwrap_or = "allow"
manual_map = "allow"
option_map_or_none = "allow"
derivable_impls = "allow"
unwrap_used = "allow"
expect_used = "allow"
panic = "allow"
todo = "allow"
unimplemented = "allow"
unreachable = "allow"
