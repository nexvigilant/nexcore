[package]
name = "nexcore-ml-pipeline"
description = "Autonomous ML pipeline for PV signal detection: feature engineering, random forest ensemble, evaluation, and prediction"
version = "0.1.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "MIT OR Apache-2.0"
repository.workspace = true
homepage.workspace = true
rust-version = "1.85"

keywords = ["nexcore", "machine-learning", "pharmacovigilance", "signal-detection"]
categories = ["science"]

[dependencies]
nexcore-dtree = { workspace = true }
nexcore-error = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

[dev-dependencies]
proptest = { version = "1.6.0" }

[lints]
workspace = true
