
[package]
name = "nexcore-cardiovascular"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "MIT OR Apache-2.0"
repository.workspace = true
homepage.workspace = true
description = "Cardiovascular data transport system — heart pump, vessel hierarchy, blood components, and pressure regulation"

keywords = ["nexcore", "mcp", "api"]
categories = ["web-programming"]
[dependencies]
nexcore-energy = { version = "0.1.0", path = "../nexcore-energy" }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }

[lints]
workspace = true
