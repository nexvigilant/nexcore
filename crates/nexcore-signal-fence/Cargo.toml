
[package]
name = "nexcore-signal-fence"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Process-level network signal container — default-deny fence grounded in signal theory"
authors = ["Matthew Campion, PharmD <matthew@nexvigilant.com>"]
license = "LicenseRef-NexVigilant-Proprietary"
repository = "https://github.com/nexvigilant/nexcore"
keywords = ["signal-detection", "network-security", "process-monitor", "firewall"]
categories = ["network-programming", "os"]

[dependencies]
nexcore-signal-theory = { version = "0.1.0", path = "../nexcore-signal-theory", registry = "nexcore" }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
nexcore-chrono = { workspace = true }
ipnetwork = "0.20"
tracing = { version = "0.1.40" }


[lints]
workspace = true
