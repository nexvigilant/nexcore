
[package]
name = "nexcore-measure"
description = "Mathematically rigorous crate and workspace quality measurement: information theory, graph theory, statistics"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository.workspace = true
homepage.workspace = true
readme = "README.md"
rust-version = "1.85"

keywords = ["nexcore", "mathematics", "science"]
categories = ["science", "algorithms"]
[[bin]]
name = "nexcore-measure"
path = "bin/nexcore_measure.rs"

[dependencies]
nexcore-error = { workspace = true }
nexcore-constants = { version = "1.0.0", path = "../nexcore-constants" }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
toml = { version = "0.8.15" }
nexcore-fs = { workspace = true }
flate2 = { version = "1.0.30" }
nexcore-chrono = { workspace = true }
clap = { version = "4.5.11", features = ["derive", "cargo", "env"] }

[dev-dependencies]
proptest = { version = "1.6.0" }


[lints]
workspace = true
