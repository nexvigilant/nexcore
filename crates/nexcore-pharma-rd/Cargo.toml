
[package]
name = "nexcore-pharma-rd"
version = "1.0.0"
edition = "2024"
rust-version = "1.85"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "MIT OR Apache-2.0"
repository.workspace = true
homepage.workspace = true
description = "Predictive pharmaceutical R&D taxonomy: 24 T2-P primitives, 14 T2-C composites, 8 T3 domain concepts, Chomsky grammar classification, and cross-domain transfer confidence."

keywords = ["nexcore", "pharmacovigilance", "drug-safety"]
categories = ["science"]
[dependencies]
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }

[lints]
workspace = true
