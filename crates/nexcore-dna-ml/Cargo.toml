[package]
name = "nexcore-dna-ml"
description = "DNA-encoded ML pipeline: encode PV features as DNA strands, compute biological similarity features, train random forest on combined representation"
version = "0.1.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "MIT OR Apache-2.0"
repository.workspace = true
homepage.workspace = true
rust-version = "1.85"

keywords = ["nexcore", "dna", "machine-learning", "pharmacovigilance"]
categories = ["science"]

[dependencies]
nexcore-dna = { version = "1.0.0", path = "../nexcore-dna" }
nexcore-ml-pipeline = { version = "0.1.0", path = "../nexcore-ml-pipeline" }
nexcore-error = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
clap = { workspace = true }

[[bin]]
name = "dna-ml"
path = "src/main.rs"

[lints]
workspace = true
