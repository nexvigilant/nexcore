[package]
name = "dna-vocab-optimizer"
version = "0.1.0"
edition = "2024"
description = "6-phase DNA spectral vocabulary optimization pipeline per SOP-001. Encodes candidate words as DNA strands, measures resonance against an anchor word, classifies into 4 spectral tiers, and produces a vocabulary architecture."
authors = ["Matthew Campion, PharmD"]
license = "MIT"

[dependencies]
nexcore-dna = { path = "../.." }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
clap = { version = "4.5", features = ["derive"] }
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[profile.release]
lto = true
strip = true
codegen-units = 1
