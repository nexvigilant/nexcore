
[package]
name = "nexcore-error"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Zero-dependency error handling for NexVigilant Core ecosystem"
license = "MIT OR Apache-2.0"
repository = "https://github.com/nexvigilant/nexcore"
homepage.workspace = true
keywords = ["error", "result", "no-std"]
categories = ["no-std", "rust-patterns"]

[dependencies]
# Replaces: thiserror, anyhow
nexcore-error-derive = { path = "../nexcore-error-derive", version = "1.0.0", optional = true }
serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
rusqlite = { workspace = true, optional = true }
reqwest = { workspace = true, optional = true }

[features]
default = ["std", "derive", "serde"]
std = []
derive = ["dep:nexcore-error-derive"]
serde = ["dep:serde"]
json = ["std", "dep:serde_json"]
sqlite = ["std", "dep:rusqlite"]
http = ["std", "dep:reqwest"]

[lints]
workspace = true
