# guardian.nexvigilant.com.conf
# Nginx config for Guardian API (TLS termination + reverse proxy)
# Place at: /etc/nginx/sites-available/guardian.nexvigilant.com
# Enable: sudo ln -sf /etc/nginx/sites-available/guardian.nexvigilant.com /etc/nginx/sites-enabled/
# TLS: sudo certbot --nginx -d guardian.nexvigilant.com

# Rate limiting zone (shared across workers)
# 10MB zone (~160k IPs), 60 requests/min per IP
limit_req_zone $binary_remote_addr zone=guardian_api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=guardian_auth:10m rate=10r/m;

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name guardian.nexvigilant.com;

    # Let certbot manage /.well-known/acme-challenge/
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name guardian.nexvigilant.com;

    # TLS — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/guardian.nexvigilant.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/guardian.nexvigilant.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # ── CORS — Studio frontend only ────────────────────────────────────────────
    # Studio origin: https://studio.nexvigilant.com (adjust if different)
    set $cors_origin "";
    if ($http_origin ~* "^https://(studio|nexvigilant)\.nexvigilant\.com$") {
        set $cors_origin $http_origin;
    }

    add_header Access-Control-Allow-Origin      $cors_origin always;
    add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
    add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Request-ID" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Max-Age           "86400" always;

    # Handle preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ── Proxy settings ─────────────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Request-ID      $request_id;
    proxy_read_timeout 60s;
    proxy_connect_timeout 5s;

    # ── Rate-limited auth routes ───────────────────────────────────────────────
    location ~* ^/v1/(auth|stripe) {
        limit_req zone=guardian_auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3030;
    }

    # ── Health check (no rate limit, no auth headers required) ────────────────
    location /health {
        proxy_pass http://127.0.0.1:3030;
        access_log off;
    }

    # ── All other API routes ───────────────────────────────────────────────────
    location / {
        limit_req zone=guardian_api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3030;
    }

    # ── Deny hidden files ──────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }

    # ── Logging ────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/guardian.access.log;
    error_log  /var/log/nginx/guardian.error.log warn;
}
