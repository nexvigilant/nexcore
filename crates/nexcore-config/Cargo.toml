
[package]
name = "nexcore-config"
version = "0.1.0"
edition = "2024"
authors = ["Matthew Campion, PharmD <matthew@nexvigilant.com>"]
description = "Type-safe configuration consolidation for NexVigilant Core ecosystem"
license = "MIT OR Apache-2.0"
repository.workspace = true
homepage.workspace = true
readme = "README.md"

keywords = ["nexcore", "pharmacovigilance", "drug-safety"]
categories = ["science"]
[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
nexcore-error = { workspace = true }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }

[dev-dependencies]
tempfile = "3.0"

[lints]
workspace = true
