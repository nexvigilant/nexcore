
[package]
name = "nexcore-model-checker"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Model checking algorithms for CTL/LTL verification of state machines"
authors = ["Matthew Campion, PharmD <matthew@nexvigilant.com>"]
license = "LicenseRef-NexVigilant-Proprietary"
repository = "https://github.com/nexvigilant/nexcore"
keywords = ["model-checking", "temporal-logic", "ctl", "ltl", "verification"]
categories = ["algorithms", "science"]

[dependencies]
nexcore-state-theory = { version = "0.1.0", path = "../nexcore-state-theory", registry = "nexcore" }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva", registry = "nexcore" }
serde = { version = "1.0.204", features = ["derive"] }

[lints]
workspace = true
