serde_json = "1.0.120"
serde_yaml = "0.9.34"
sha2 = "0.10.8"
hmac = "0.12.1"
# slint = "1.9"
# slint-build = "1.9"
syn = { version = "2.0.71", features = ["full"] }
tar = "0.4.41"
tempfile = "3.10.1"
# thiserror = "1.0.61"  # REPLACED by nexcore-error + nexcore-error-derive
