[package]
name = "ncos"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
leptos = { workspace = true }
leptos_router = { workspace = true }
leptos_meta = { workspace = true }
leptos_axum = { workspace = true , optional = true }

axum = { workspace = true , optional = true }
tokio = { workspace = true , optional = true }
tower = { workspace = true , optional = true }
tower-http = { workspace = true , optional = true }

serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true , optional = true }

# Shared Infrastructure
wksp-core = { workspace = true }
wksp-api-client = { workspace = true }
wksp-components = { workspace = true }

# Client-side (WASM) dependencies
gloo-net = { version = "0.6", optional = true }
gloo-storage = { version = "0.3", optional = true }
wasm-bindgen = { workspace = true , optional = true }
web-sys = { workspace = true , optional = true }

reqwest = { workspace = true , optional = true }
[features]
default = []
ssr = [
    "leptos/ssr",
    "leptos_router/ssr",
    "leptos_meta/ssr",
    "dep:leptos_axum",
    "dep:axum",
    "dep:tokio",
    "dep:tower",
    "dep:tower-http",
    "dep:reqwest",
    "dep:tracing-subscriber",
    "wksp-api-client/ssr",
    "wksp-components/ssr",
]
hydrate = [
    "leptos/hydrate",
    "dep:wasm-bindgen",
    "dep:gloo-net",
    "dep:gloo-storage",
    "dep:web-sys",
    "wksp-api-client/hydrate",
    "wksp-components/hydrate",
]

# Leptos settings for cargo-leptos
[package.metadata.leptos]
bin-target = "ncos"
site-root = "target/site"
site-pkg-dir = "pkg"
site-addr = "127.0.0.1:3000"
reload-port = 3001
browser-open = false
style-file = "style/main.css"
assets-dir = "public"
