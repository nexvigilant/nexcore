
[package]
name = "nexcore-signal-fence"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Process-level network signal container — default-deny fence grounded in signal theory"
authors = ["Matthew Campion, PharmD <matthew@camp-corp.com>"]
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository = "https://github.com/nexvigilant/nexcore"
homepage.workspace = true
keywords = ["signal-detection", "network-security", "process-monitor", "firewall"]
categories = ["network-programming", "os"]

[dependencies]
nexcore-signal-theory = { workspace = true }
nexcore-signal-types = { workspace = true }
nexcore-lex-primitiva = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
nexcore-chrono = { workspace = true }
ipnetwork = "0.20"
tracing = { version = "0.1.40" }


[lints]
workspace = true
