
[package]
name = "nexcore-preemptive-pv"
description = "Preemptive Pharmacovigilance: three-tier signal detection (Reactive, Predictive, Preemptive) with thermodynamic feasibility and competitive inhibition intervention model"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "LicenseRef-NexVigilant-Proprietary-1.0"
repository = "https://github.com/nexvigilant/nexcore"
homepage.workspace = true
readme = "README.md"
rust-version = "1.85"
keywords = ["pharmacovigilance", "preemptive", "signal-detection", "drug-safety"]
categories = ["science", "algorithms"]

[dependencies]
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }

[lints]
workspace = true
