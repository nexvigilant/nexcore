
[package]
publish = false
name = "skills"
version = "0.1.0"
edition = "2024"
description = "Unified skill crate: core types, loader, transfer confidence, primitive extraction"
license = "MIT OR Apache-2.0"
repository.workspace = true

[dependencies]
nexcore-error = { workspace = true }
# Derive macros (must stay separate crate - proc-macro requirement)
skill-macros = { version = "0.1.0", path = "../skill-macros"}
# Direct dependencies (formerly from sub-crates)
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yml = "0.0.12"
async-trait = "0.1"
regex = "1.11"
tokio = { version = "1.0", features = ["rt", "macros"] }
nexcore-fs = { workspace = true }
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva"}

[dev-dependencies]
tokio = { version = "1.0", features = ["rt-multi-thread", "macros"] }

[lints]
workspace = true
