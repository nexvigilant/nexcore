
[package]
name = "nexcore-labs"
version = "1.0.0"
edition = "2024"
authors = ["NexVigilant Team <team@nexvigilant.com>"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/nexvigilant/nexcore"
homepage.workspace = true
rust-version = "1.85"
description = "NexVigilant Core Labs: Experimental and non-core domain modules (Quiz, Betting, Academy)"

keywords = ["nexcore", "pharmacovigilance", "drug-safety"]
categories = ["science"]
[dependencies]
nexcore-lex-primitiva = { version = "0.1.0", path = "../nexcore-lex-primitiva" }
nexcore-constants = { version = "1.0.0", path = "../nexcore-constants" }
nexcore-id = { version = "0.1.0", path = "../nexcore-id", features = ["serde"] }
nexcore-signal-types = { version = "1.0.0", path = "../nexcore-signal-types" }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120" }
nexcore-chrono = { workspace = true }
dashmap = { version = "6.0.1" }
rand = { version = "0.9.0" }
nexcore-error = { workspace = true }


[lints]
workspace = true
